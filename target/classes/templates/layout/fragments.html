<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<!-- ============================================================
     E4NET PMS - 공통 레이아웃 프래그먼트
     activePage 값 목록:
       home
       biz-standard-output
       biz-manpower-input
       biz-scope-requirement, biz-scope-wbs
       biz-report-regular, biz-report-weekly, biz-report-monthly, biz-report-meeting
       biz-risk-risk, biz-risk-issue
       exec-analysis-flow, exec-analysis-menu
       exec-design-interface, exec-design-screen, exec-design-program, exec-design-table
       exec-impl-unit
       exec-test-integration
       community-notice-list
       community-archive-list
       admin-project-list
       admin-user-list
       admin-role-list
     ============================================================ -->

<!-- 상단 헤더 프래그먼트 -->
<header th:fragment="header" class="header">
    <button class="header-hamburger">&#9776;</button>
    <div class="header-logo"><a href="/home">E4NET PMS</a></div>
    <!-- 선택된 사업명 표시 (로고 우측) -->
    <div class="selected-project" th:if="${session.selectedProject != null}">
        <span class="project-badge" th:text="${session.selectedProject.projectName}"></span>
        <a href="/project-select" class="btn-change-project">프로젝트 변경</a>
    </div>
    <div class="header-right">
        <div class="user-info">
            <span th:if="${session.loginUser != null}"
                  th:text="${session.loginUser.name + (session.loginUserRoleName != null ? '(' + session.loginUserRoleName + ')' : '') + ' 님 환영합니다.'}">
            </span>
        </div>
        <a class="btn-profile" href="/admin/users/my-profile"
           th:if="${session.loginUser != null}" title="내 정보 수정">&#128100;</a>
        <a class="btn-logout" th:href="@{/logout}">로그아웃</a>
    </div>
</header>

<!-- 좌측 사이드바 프래그먼트 (DB 메뉴 동적 렌더링) -->
<aside th:fragment="sidebar(activePage)" class="sidebar">
    <div class="sidebar-logo"><a href="/home">E4NET PMS</a></div>
    <ul class="menu-list">

        <!-- 사업 Home (고정) -->
        <li class="menu-item">
            <a href="/home"><span class="menu-icon">&#127968;</span> 사업 Home</a>
        </li>

        <!-- depth=1 섹션 -->
        <th:block th:each="d1 : ${sidebarMenus}" th:if="${d1.depth == 1}">
            <li class="menu-section">
                <div class="menu-section-header">
                    <th:block th:if="${d1.icon != null and !#strings.isEmpty(d1.icon)}">
                        <span class="menu-icon" th:utext="${d1.icon}"></span>
                    </th:block>
                    <span th:text="${d1.menuName}">섹션</span>
                    <span class="arrow">&#9660;</span>
                </div>
                <ul class="section-body">

                    <!-- depth=2 그룹 -->
                    <th:block th:each="d2 : ${sidebarMenus}" th:if="${d2.depth == 2 and d2.parentId == d1.id}">
                        <li class="menu-group">
                            <div class="menu-group-header">
                                <span th:text="${d2.menuName}">그룹</span>
                                <span class="arrow-sm">&#9660;</span>
                            </div>
                            <ul class="submenu">

                                <!-- depth=3 리프 메뉴 -->
                                <th:block th:each="d3 : ${sidebarMenus}" th:if="${d3.depth == 3 and d3.parentId == d2.id}">
                                    <li th:classappend="${d3.contextPath != null and #strings.startsWith(currentUri, d3.contextPath)} ? 'active'">
                                        <a th:href="${d3.contextPath}" th:text="${d3.menuName}">메뉴</a>
                                    </li>
                                </th:block>

                            </ul>
                        </li>
                    </th:block>

                </ul>
            </li>
        </th:block>

    </ul>

    <script>
    // 현재 활성 메뉴의 상위 그룹/섹션 자동 열기
    (function() {
        var active = document.querySelector('.submenu li.active');
        if (active) {
            var g = active.closest('.menu-group');
            if (g) g.classList.add('open');
            var s = active.closest('.menu-section');
            if (s) s.classList.add('open');
        }
    })();
    </script>
</aside>

</html>
