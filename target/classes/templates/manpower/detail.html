<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인력 상세 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 상단 헤더 -->
<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">

    <!-- 좌측 사이드바 -->
    <aside th:replace="~{layout/fragments :: sidebar('plan-manpower')}"></aside>

    <!-- 메인 콘텐츠 -->
    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업 계획</span>
            <span class="sep">/</span><a href="/manpower">인력계획</a>
            <span class="sep">/</span><span class="current">인력 상세</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">사업 인력 상세</div>
                <div class="btn-group">
                    <a class="btn btn-edit" th:href="@{/manpower/{id}/edit(id=${manpower.id})}">&#9998; 수정</a>
                    <button class="btn btn-delete" type="button" onclick="openDeleteModal()">&#128465; 삭제</button>
                    <a class="btn btn-list" href="/manpower">&#9776; 목록</a>
                </div>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <div class="detail-card">
                <div class="detail-card-header">&#128100; 사업 구성원 정보</div>
                <div class="detail-grid">

                    <div class="detail-cell">
                        <span class="detail-label">사업명</span>
                        <span class="detail-value" th:text="${manpower.projectName}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">참여자</span>
                        <span class="detail-value" th:text="${manpower.userName}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">소속회사</span>
                        <span class="detail-value" th:text="${manpower.company ?: '-'}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">소속부서</span>
                        <span class="detail-value" th:text="${manpower.department ?: '-'}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">연락처</span>
                        <span class="detail-value" th:text="${manpower.phone ?: '-'}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">직위</span>
                        <span class="detail-value" th:text="${manpower.position ?: '-'}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">역할</span>
                        <span class="detail-value" th:text="${manpower.role}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">급수</span>
                        <span class="detail-value" th:text="${manpower.gradeCode}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">투입구분</span>
                        <span class="detail-value" th:text="${manpower.inputTypeCode}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">투입MM</span>
                        <span class="detail-value" th:text="${manpower.inputMm != null ? manpower.inputMm + 'M' : '-'}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">투입시작일</span>
                        <span class="detail-value"
                              th:text="${manpower.inputStartDate != null ? #temporals.format(manpower.inputStartDate, 'yyyy-MM-dd') : '-'}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">투입종료일</span>
                        <span class="detail-value"
                              th:text="${manpower.inputEndDate != null ? #temporals.format(manpower.inputEndDate, 'yyyy-MM-dd') : '-'}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">상태</span>
                        <span class="badge" th:classappend="'badge-' + ${manpower.status}"
                              th:text="${manpower.status}">-</span>
                    </div>
                    <div class="detail-cell">
                        <span class="detail-label">비고</span>
                        <span class="detail-value" th:text="${manpower.note ?: '-'}">-</span>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header red">
            <span class="modal-title">&#128465; 삭제 확인</span>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong th:text="${manpower.userName}">참여자</strong> 님의 인력 정보를 삭제하시겠습니까?</p>
            <p style="margin-top:8px;color:#718096;font-size:12px;">삭제된 데이터는 복구할 수 없습니다.</p>
        </div>
        <div class="modal-footer">
            <form th:action="@{/manpower/{id}/delete(id=${manpower.id})}" method="post">
                <button type="submit" class="btn btn-delete">삭제</button>
            </form>
            <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    function openDeleteModal()  { document.getElementById('deleteModal').classList.add('open'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });
</script>
</body>
</html>
