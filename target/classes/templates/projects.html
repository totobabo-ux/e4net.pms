<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사업정보 관리 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* ── projects.html 전용 스타일 ── */
        tbody tr.row-sales       { background: #fffbea; }
        tbody tr.row-sales:hover { background: #fef9c3; }
        .btn-edit { background: none; border: none; color: #2980b9; cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 3px; }
        .btn-edit:hover { background: #ebf4ff; }
        .btn-del  { background: none; border: none; color: #e53e3e; cursor: pointer; font-size: 11px; padding: 2px 6px; border-radius: 3px; }
        .btn-del:hover  { background: #fff5f5; }
    </style>
</head>
<body>

<!-- 상단 헤더 -->
<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">

    <!-- 좌측 사이드바 -->
    <aside th:replace="~{layout/fragments :: sidebar('plan-info')}"></aside>

    <!-- 메인 콘텐츠 -->
    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span>
            <span>사업 계획</span>
            <span class="sep">/</span>
            <span class="current">사업정보 관리</span>
        </div>

        <div class="content">
            <div class="page-title">사업정보 관리</div>

            <!-- 성공 메시지 -->
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <!-- 검색 폼 (GET) -->
            <form th:action="@{/projects}" method="get">
                <div class="search-box">
                    <div class="search-row">
                        <span class="search-label">프로젝트명(코드)</span>
                        <input type="text" name="keyword" class="search-input w-lg"
                               th:value="${search.keyword}">
                        <div class="divider"></div>
                        <span class="search-label">구분</span>
                        <select name="category" class="search-select w-md">
                            <option value="">전체</option>
                            <option value="SL" th:selected="${search.category == 'SL'}">SL</option>
                            <option value="SM" th:selected="${search.category == 'SM'}">SM</option>
                            <option value="서비스" th:selected="${search.category == '서비스'}">서비스</option>
                        </select>
                        <div class="divider"></div>
                        <span class="search-label">회사</span>
                        <select name="company" class="search-select w-lg">
                            <option value="">전체</option>
                            <option value="(주)이포넷" th:selected="${search.company == '(주)이포넷'}">(주)이포넷</option>
                        </select>
                    </div>
                    <div class="search-row">
                        <span class="search-label">계약일자</span>
                        <input type="date" name="contractStartFrom" class="search-input w-md"
                               th:value="${search.contractStartFrom}">
                        <span class="tilde">~</span>
                        <input type="date" name="contractStartTo" class="search-input w-md"
                               th:value="${search.contractStartTo}">
                        <button type="button" class="btn-clear-date"
                                onclick="this.closest('form').querySelector('[name=contractStartFrom]').value='';this.closest('form').querySelector('[name=contractStartTo]').value=''">&#10005;</button>
                        <div class="divider"></div>
                        <span class="search-label">발주처</span>
                        <input type="text" name="orderer" class="search-input w-md"
                               th:value="${search.orderer}">
                        <div class="divider"></div>
                        <span class="search-label">계약처</span>
                        <input type="text" name="contractor" class="search-input w-md"
                               th:value="${search.contractor}">
                    </div>
                    <div class="search-row">
                        <span class="search-label">공개여부</span>
                        <select name="isPublicStr" class="search-select w-md">
                            <option value="">전체</option>
                            <option value="true"  th:selected="${search.isPublicStr == 'true'}">공개</option>
                            <option value="false" th:selected="${search.isPublicStr == 'false'}">비공개</option>
                        </select>
                        <div class="divider"></div>
                        <span class="search-label">진행상태</span>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="statusList" value="영업"
                                          th:checked="${search.statusList != null && search.statusList.contains('영업')}"> 영업</label>
                            <label><input type="checkbox" name="statusList" value="진행"
                                          th:checked="${search.statusList != null && search.statusList.contains('진행')}"> 진행</label>
                            <label><input type="checkbox" name="statusList" value="완료"
                                          th:checked="${search.statusList != null && search.statusList.contains('완료')}"> 완료</label>
                            <label><input type="checkbox" name="statusList" value="종료"
                                          th:checked="${search.statusList != null && search.statusList.contains('종료')}"> 종료</label>
                            <label><input type="checkbox" name="statusList" value="수주못함"
                                          th:checked="${search.statusList != null && search.statusList.contains('수주못함')}"> 수주못함</label>
                        </div>
                        <div class="divider"></div>
                        <span class="search-label">PM</span>
                        <input type="text" name="pm" class="search-input w-sm"
                               th:value="${search.pm}">
                        <button type="submit" class="btn-search">&#128269; 검색</button>
                    </div>
                </div>
            </form>

            <!-- 툴바 -->
            <div class="toolbar">
                <div class="legend">
                    <div class="legend-item"><div class="legend-dot blue"></div> 영업/진행</div>
                    <div class="legend-item"><div class="legend-dot red"></div> 진행(계약종료)</div>
                    <div class="legend-item"><div class="legend-dot black"></div> 완료</div>
                    <div class="legend-item"><div class="legend-dot green"></div> 종료</div>
                </div>
                <div class="toolbar-right">
                    <button class="btn-toolbar btn-register" onclick="location.href='/projects/new'">&#43; 프로젝트등록</button>
                    <button class="btn-toolbar btn-start">&#9658; 시작 목록</button>
                    <button class="btn-toolbar btn-end">&#9632; 종료 목록</button>
                </div>
            </div>

            <!-- 프로젝트 목록 테이블 -->
            <div class="table-card">
                <div class="table-card-header">
                    <span class="table-card-title">프로젝트 목록</span>
                    <span class="table-count">&#9888; 총 <span th:text="${totalCount}">0</span>개</span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>NO.</th>
                                <th>공개</th>
                                <th style="min-width:300px;">프로젝트명</th>
                                <th>구분</th>
                                <th>발주처</th>
                                <th>계약처</th>
                                <th>계약기간</th>
                                <th>PM</th>
                                <th>계약금액</th>
                                <th>사전투입</th>
                                <th>MM</th>
                                <th>인원수</th>
                                <th>상태</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="empty-row" th:if="${#lists.isEmpty(projects)}">
                                <td colspan="14">등록된 프로젝트가 없습니다.</td>
                            </tr>
                            <tr th:each="p, stat : ${projects}"
                                th:classappend="${p.status == '영업'} ? 'row-sales' : ''">
                                <td th:text="${stat.count}"></td>
                                <td th:text="${p.isPublic ? '공개' : '비공개'}"></td>
                                <td class="td-left">
                                    <a class="td-link"
                                       th:href="@{/projects/{id}/edit(id=${p.id})}"
                                       th:text="${p.projectName}"></a>
                                </td>
                                <td th:text="${p.category}"></td>
                                <td th:text="${p.orderer}"></td>
                                <td th:text="${p.contractor}"></td>
                                <td th:text="${p.contractStart != null ? #temporals.format(p.contractStart,'yy/MM/dd') : ''} + ' ~ ' + ${p.contractEnd != null ? #temporals.format(p.contractEnd,'yy/MM/dd') : ''}"></td>
                                <td th:text="${p.pm}"></td>
                                <td class="td-right"
                                    th:text="${p.contractAmount != null ? #numbers.formatInteger(p.contractAmount, 0, 'COMMA') : ''}"></td>
                                <td th:text="${p.preInputMm != null ? p.preInputMm + 'M' : ''}"></td>
                                <td th:text="${p.totalMm != null ? p.totalMm + 'M' : ''}"></td>
                                <td th:text="${p.headcount}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="'badge-' + ${p.status}"
                                          th:text="${p.status}"></span>
                                </td>
                                <td>
                                    <a class="btn-edit" th:href="@{/projects/{id}/edit(id=${p.id})}">수정</a>
                                    <form th:action="@{/projects/{id}/delete(id=${p.id})}" method="post"
                                          style="display:inline"
                                          onsubmit="return confirm('삭제하시겠습니까?')">
                                        <button type="submit" class="btn-del">삭제</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
</body>
</html>
