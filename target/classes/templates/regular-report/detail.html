<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정기보고 상세 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        #editSection { display:none; }
        #viewSection { display:block; }
        .file-area { display:flex; align-items:center; gap:10px; flex:1; }
        .file-info  { font-size:12px; color:#2980b9; }
    </style>
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('biz-report-regular')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>보고관리</span>
            <span class="sep">/</span><a href="/regular-report">정기보고</a>
            <span class="sep">/</span><span class="current">정기보고 상세</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">정기보고 상세</div>
                <!-- 조회 모드 버튼 -->
                <div class="btn-group" id="viewButtons">
                    <button type="button" class="btn btn-edit" onclick="switchToEdit()">&#9998; 수정</button>
                    <button type="button" class="btn btn-delete" onclick="openDeleteModal()">&#128465; 삭제</button>
                    <a class="btn btn-list" href="/regular-report">&#9776; 목록</a>
                </div>
                <!-- 수정 모드 버튼 -->
                <div class="btn-group" id="editButtons" style="display:none;">
                    <button type="submit" form="reportEditForm" class="btn btn-primary">&#10003; 저장</button>
                    <button type="button" class="btn btn-cancel" onclick="switchToView()">&#10005; 취소</button>
                </div>
            </div>

            <!-- 성공 메시지 -->
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <!-- ───────── 조회 섹션 ───────── -->
            <div id="viewSection">

                <!-- 보고 기본 정보 -->
                <div class="detail-card">
                    <div class="detail-card-header">&#128196; 보고 기본 정보</div>
                    <div class="detail-grid">

                        <div class="detail-cell">
                            <span class="detail-label">사업명</span>
                            <span class="detail-value" th:text="${report.projectName}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">보고구분</span>
                            <span class="badge"
                                  th:classappend="${report.reportType == '착수보고'} ? 'badge-등록'
                                                : (${report.reportType == '중간보고'} ? 'badge-분석중'
                                                : (${report.reportType == '완료보고'} ? 'badge-완료' : 'badge-보류'))"
                                  th:text="${report.reportType ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1;">
                            <span class="detail-label">보고서명</span>
                            <span class="detail-value" th:text="${report.reportName ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell">
                            <span class="detail-label">보고일자</span>
                            <span class="detail-value" th:text="${report.reportDate ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">작성자</span>
                            <span class="detail-value" th:text="${report.writer ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">보고내용</span>
                            <span class="detail-value" style="white-space:pre-wrap;"
                                  th:text="${report.reportContent ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1;">
                            <span class="detail-label">첨부파일</span>
                            <span class="detail-value">
                                <a th:if="${report.attachFileName != null}"
                                   th:href="@{/regular-report/{id}/download(id=${report.id})}"
                                   class="td-link">
                                    &#128206; <span th:text="${report.attachFileName}"></span>
                                </a>
                                <span th:unless="${report.attachFileName != null}" style="color:#a0aec0;">첨부파일 없음</span>
                            </span>
                        </div>

                    </div>
                </div>

            </div>

            <!-- ───────── 수정 섹션 ───────── -->
            <div id="editSection">
                <form id="reportEditForm"
                      th:action="@{/regular-report/{id}/edit(id=${report.id})}"
                      method="post"
                      enctype="multipart/form-data"
                      th:object="${report}">

                    <!-- 보고 기본 정보 -->
                    <div class="form-card">
                        <div class="form-card-header">&#128196; 보고 기본 정보 수정</div>
                        <div class="form-card-body">
                            <div class="form-grid-2col">

                                <div class="form-cell">
                                    <label class="form-label">사업명</label>
                                    <input type="hidden" th:field="*{projectId}">
                                    <span th:text="${session.selectedProject != null ? session.selectedProject.projectName : report.projectName}"
                                          style="font-weight:bold; color:#2c3e50;"></span>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">보고구분<span class="req">※</span></label>
                                    <select class="form-control" th:field="*{reportType}">
                                        <option value="">-- 보고구분 선택 --</option>
                                        <option value="착수보고">착수보고</option>
                                        <option value="중간보고">중간보고</option>
                                        <option value="완료보고">완료보고</option>
                                        <option value="기타보고">기타보고</option>
                                    </select>
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1;">
                                    <label class="form-label">보고서명<span class="req">※</span></label>
                                    <input type="text" class="form-control" th:field="*{reportName}"
                                           placeholder="보고서명을 입력하세요">
                                </div>

                                <div class="form-cell">
                                    <label class="form-label">보고일자</label>
                                    <input type="date" class="form-control" th:field="*{reportDate}">
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">작성자</label>
                                    <input type="text" class="form-control" th:field="*{writer}" placeholder="작성자명">
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">보고내용</label>
                                    <textarea class="form-control" th:field="*{reportContent}"
                                              rows="8" placeholder="보고 내용을 입력하세요"
                                              style="resize:vertical;"></textarea>
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1;">
                                    <label class="form-label">첨부파일</label>
                                    <div class="file-area">
                                        <input type="file" name="attachFile" class="form-control" style="padding:4px; flex:1;">
                                        <span th:if="${report.attachFileName != null}" class="file-info">
                                            현재: &#128206; <span th:text="${report.attachFileName}"></span>
                                            <span style="color:#718096;">(새 파일 선택 시 교체)</span>
                                        </span>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header red">
            <span class="modal-title">&#128465; 삭제 확인</span>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong th:text="${report.reportName ?: '선택한 항목'}">정기보고</strong> 을(를) 삭제하시겠습니까?</p>
            <p style="margin-top:8px;color:#718096;font-size:12px;">삭제된 데이터는 복구할 수 없습니다.</p>
        </div>
        <div class="modal-footer">
            <form th:action="@{/regular-report/{id}/delete(id=${report.id})}" method="post">
                <button type="submit" class="btn btn-delete">삭제</button>
            </form>
            <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    function switchToEdit() {
        document.getElementById('viewSection').style.display = 'none';
        document.getElementById('editSection').style.display = 'block';
        document.getElementById('viewButtons').style.display = 'none';
        document.getElementById('editButtons').style.display = 'flex';
    }
    function switchToView() {
        document.getElementById('viewSection').style.display = 'block';
        document.getElementById('editSection').style.display = 'none';
        document.getElementById('viewButtons').style.display = 'flex';
        document.getElementById('editButtons').style.display = 'none';
    }
    function openDeleteModal()  { document.getElementById('deleteModal').classList.add('open'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });
</script>
</body>
</html>
