<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위험 상세 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        #editSection { display:none; }
        #viewSection { display:block; }
    </style>
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('biz-risk-risk')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>위험관리</span>
            <span class="sep">/</span><a href="/risk">위험관리</a>
            <span class="sep">/</span><span class="current">위험 상세</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">위험 상세</div>
                <div class="btn-group" id="viewButtons">
                    <button type="button" class="btn btn-edit" onclick="switchToEdit()">&#9998; 수정</button>
                    <button type="button" class="btn btn-delete" onclick="openDeleteModal()">&#128465; 삭제</button>
                    <a class="btn btn-list" href="/risk">&#9776; 목록</a>
                </div>
                <div class="btn-group" id="editButtons" style="display:none;">
                    <button type="submit" form="riskEditForm" class="btn btn-primary">&#10003; 저장</button>
                    <button type="button" class="btn btn-cancel" onclick="switchToView()">&#10005; 취소</button>
                </div>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <!-- ───────── 조회 섹션 ───────── -->
            <div id="viewSection">

                <!-- 기본 정보 -->
                <div class="detail-card">
                    <div class="detail-card-header">&#9888; 위험 기본 정보</div>
                    <div class="detail-grid">

                        <div class="detail-cell">
                            <span class="detail-label">사업명</span>
                            <span class="detail-value" th:text="${risk.projectName}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">위험코드</span>
                            <span class="detail-value" th:text="${risk.riskCode ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1;">
                            <span class="detail-label">위험명</span>
                            <span class="detail-value" th:text="${risk.riskName}">-</span>
                        </div>

                        <div class="detail-cell" style="border-right: 1px solid #d0d8e4;">
                            <span class="detail-label">위험유형</span>
                            <span class="detail-value" th:text="${risk.riskType ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell" style="border-right: none;">
                            <span class="detail-label">식별일자</span>
                            <span class="detail-value" th:text="${risk.identifiedDate ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">위험설명</span>
                            <span class="detail-value" style="white-space:pre-wrap;"
                                  th:text="${risk.description ?: '-'}">-</span>
                        </div>

                    </div>
                </div>

                <!-- 위험 평가 -->
                <div class="detail-card">
                    <div class="detail-card-header">&#128202; 위험 평가</div>
                    <div class="detail-grid">

                        <div class="detail-cell">
                            <span class="detail-label">발생가능성</span>
                            <span class="detail-value" th:text="${risk.probability ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">영향도</span>
                            <span class="detail-value" th:text="${risk.impact ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">위험등급</span>
                            <span class="badge"
                                  th:classappend="'badge-' + ${risk.riskLevel}"
                                  th:text="${risk.riskLevel ?: '-'}"></span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">위험상태</span>
                            <span class="badge"
                                  th:classappend="'badge-' + ${risk.status}"
                                  th:text="${risk.status}"></span>
                        </div>

                    </div>
                </div>

                <!-- 대응 정보 -->
                <div class="detail-card">
                    <div class="detail-card-header">&#128736; 대응 정보</div>
                    <div class="detail-grid">

                        <div class="detail-cell">
                            <span class="detail-label">대응전략</span>
                            <span class="detail-value" th:text="${risk.responseStrategy ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">담당자</span>
                            <span class="detail-value" th:text="${risk.owner ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">대응계획</span>
                            <span class="detail-value" style="white-space:pre-wrap;"
                                  th:text="${risk.responsePlan ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">활동결과</span>
                            <span class="detail-value" style="white-space:pre-wrap;"
                                  th:text="${risk.activityResult ?: '-'}">-</span>
                        </div>

                        <!-- 첨부파일 목록 (조회) -->
                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">첨부파일</span>
                            <div style="flex:1; min-width:0;">
                                <div th:if="${#lists.isEmpty(risk.attachments)}" class="attach-empty">첨부파일 없음</div>
                                <div th:each="att : ${risk.attachments}" class="attach-row attach-view">
                                    <span class="attach-icon">&#128196;</span>
                                    <a th:href="@{/risk/{id}/attachment/{attId}/download(id=${risk.id},attId=${att.id})}"
                                       class="attach-name td-link" th:text="${att.fileName}"></a>
                                    <span class="attach-size" th:text="${att.fileSizeDisplay}"></span>
                                    <span style="font-size:12px; color:#2980b9;">&#11015; 다운로드</span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>

            <!-- ───────── 수정 섹션 ───────── -->
            <div id="editSection">
                <form id="riskEditForm"
                      th:action="@{/risk/{id}/edit(id=${risk.id})}"
                      method="post"
                      enctype="multipart/form-data"
                      th:object="${risk}">

                    <input type="hidden" th:field="*{projectId}">

                    <!-- 기본 정보 수정 -->
                    <div class="form-card">
                        <div class="form-card-header">&#9888; 위험 기본 정보 수정</div>
                        <div class="form-card-body">
                            <div class="form-grid-2col">

                                <div class="form-cell">
                                    <label class="form-label">사업명</label>
                                    <span th:text="${session.selectedProject != null ? session.selectedProject.projectName : risk.projectName}"
                                          style="font-weight:bold; color:#2c3e50;"></span>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">위험코드</label>
                                    <input type="text" class="form-control" th:field="*{riskCode}" placeholder="위험코드 (예: RSK-001)">
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1;">
                                    <label class="form-label">위험명<span class="req">※</span></label>
                                    <input type="text" class="form-control" th:field="*{riskName}" placeholder="위험명을 입력하세요">
                                </div>

                                <div class="form-cell" style="border-right: 1px solid #d0d8e4;">
                                    <label class="form-label">위험유형</label>
                                    <select class="form-control" th:field="*{riskType}">
                                        <option value="">선택</option>
                                        <option th:each="c : ${codes['RISK_TYPE']}"
                                                th:value="${c.code}" th:text="${c.codeName}"></option>
                                    </select>
                                </div>
                                <div class="form-cell" style="border-right: none;">
                                    <label class="form-label">식별일자</label>
                                    <input type="date" class="form-control" th:field="*{identifiedDate}">
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">위험설명</label>
                                    <textarea class="form-control" th:field="*{description}"
                                              rows="4" placeholder="위험에 대한 설명을 입력하세요"
                                              style="resize:vertical;"></textarea>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- 위험 평가 수정 -->
                    <div class="form-card">
                        <div class="form-card-header">&#128202; 위험 평가 수정</div>
                        <div class="form-card-body">
                            <div class="form-grid-2col">

                                <div class="form-cell">
                                    <label class="form-label">발생가능성</label>
                                    <select class="form-control" th:field="*{probability}">
                                        <option th:each="c : ${codes['RISK_PROBABILITY']}"
                                                th:value="${c.code}" th:text="${c.codeName}"></option>
                                    </select>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">영향도</label>
                                    <select class="form-control" th:field="*{impact}">
                                        <option th:each="c : ${codes['RISK_IMPACT']}"
                                                th:value="${c.code}" th:text="${c.codeName}"></option>
                                    </select>
                                </div>

                                <div class="form-cell">
                                    <label class="form-label">위험등급</label>
                                    <select class="form-control" th:field="*{riskLevel}">
                                        <option value="">선택</option>
                                        <option th:each="c : ${codes['RISK_LEVEL']}"
                                                th:value="${c.code}" th:text="${c.codeName}"></option>
                                    </select>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">위험상태</label>
                                    <select class="form-control" th:field="*{status}">
                                        <option th:each="c : ${codes['RISK_STATUS']}"
                                                th:value="${c.code}" th:text="${c.codeName}"></option>
                                    </select>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- 대응 정보 수정 -->
                    <div class="form-card">
                        <div class="form-card-header">&#128736; 대응 정보 수정</div>
                        <div class="form-card-body">
                            <div class="form-grid-2col">

                                <div class="form-cell">
                                    <label class="form-label">대응전략</label>
                                    <select class="form-control" th:field="*{responseStrategy}">
                                        <option value="">선택</option>
                                        <option th:each="c : ${codes['RISK_STRATEGY']}"
                                                th:value="${c.code}" th:text="${c.codeName}"></option>
                                    </select>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">담당자</label>
                                    <input type="text" class="form-control" th:field="*{owner}" placeholder="담당자명">
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">대응계획</label>
                                    <textarea class="form-control" th:field="*{responsePlan}"
                                              rows="4" placeholder="대응계획을 입력하세요"
                                              style="resize:vertical;"></textarea>
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">활동결과</label>
                                    <textarea class="form-control" th:field="*{activityResult}"
                                              rows="4" placeholder="활동결과를 입력하세요"
                                              style="resize:vertical;"></textarea>
                                </div>

                                <!-- 첨부파일 (수정) -->
                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">첨부파일</label>
                                    <div class="attach-zone">
                                        <div th:if="${not #lists.isEmpty(risk.attachments)}">
                                            <div class="attach-section-label">기존 첨부파일</div>
                                            <div th:each="att : ${risk.attachments}" class="attach-row attach-existing">
                                                <span class="attach-icon">&#128196;</span>
                                                <span class="attach-name" th:text="${att.fileName}"></span>
                                                <span class="attach-size" th:text="${att.fileSizeDisplay}"></span>
                                                <form th:action="@{/risk/{id}/attachment/{attId}/delete(id=${risk.id},attId=${att.id})}"
                                                      method="post" style="margin:0; flex-shrink:0;">
                                                    <button type="submit" class="btn-sm-del"
                                                            onclick="return confirm('이 첨부파일을 삭제하시겠습니까?')">삭제</button>
                                                </form>
                                            </div>
                                        </div>
                                        <div id="editPendingList_label" class="attach-section-label" style="display:none; margin-top:8px;">추가할 파일</div>
                                        <div id="editPendingList"></div>
                                        <div class="attach-add-area">
                                            <button type="button" class="btn-attach-add"
                                                    onclick="document.getElementById('editFileInput').click()">
                                                &#128206; 파일 추가
                                            </button>
                                            <span class="attach-hint">여러 파일 동시 선택 가능</span>
                                        </div>
                                        <input type="file" id="editFileInput" name="attachFiles" multiple style="display:none;">
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header red">
            <span class="modal-title">&#128465; 삭제 확인</span>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong th:text="${risk.riskName ?: '선택한 항목'}">위험</strong> 을(를) 삭제하시겠습니까?</p>
            <p style="margin-top:8px;color:#718096;font-size:12px;">삭제된 데이터는 복구할 수 없습니다.</p>
        </div>
        <div class="modal-footer">
            <form th:action="@{/risk/{id}/delete(id=${risk.id})}" method="post">
                <button type="submit" class="btn btn-delete">삭제</button>
            </form>
            <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    function switchToEdit() {
        document.getElementById('viewSection').style.display = 'none';
        document.getElementById('editSection').style.display = 'block';
        document.getElementById('viewButtons').style.display = 'none';
        document.getElementById('editButtons').style.display = 'flex';
    }
    function switchToView() {
        document.getElementById('viewSection').style.display = 'block';
        document.getElementById('editSection').style.display = 'none';
        document.getElementById('viewButtons').style.display = 'flex';
        document.getElementById('editButtons').style.display = 'none';
    }
    function openDeleteModal()  { document.getElementById('deleteModal').classList.add('open'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });
    initAttachUpload('editFileInput', 'editPendingList', 'riskEditForm');
</script>
</body>
</html>
