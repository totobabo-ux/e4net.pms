<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        body {
            background: #2c3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-header {
            background: #c0392b;
            padding: 0 30px;
            height: 50px;
            display: flex;
            align-items: center;
        }
        .login-header span {
            color: white;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .register-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .register-card {
            background: white;
            border-radius: 4px;
            width: 480px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .register-card-header {
            background: #2c3e50;
            padding: 20px 32px;
            text-align: center;
        }
        .register-card-header h1 {
            color: white;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .register-card-header p {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 4px;
        }
        .register-card-body {
            padding: 28px 32px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 20px;
        }
        .field {
            margin-bottom: 14px;
        }
        .field label {
            display: block;
            font-size: 12px;
            color: #555;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .field label .req { color: #c0392b; margin-left: 2px; }
        .field input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .field input:focus { border-color: #2980b9; }
        .field.full { grid-column: 1 / -1; }
        .btn-wrap {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-submit {
            flex: 1;
            padding: 11px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
            font-family: inherit;
        }
        .btn-submit:hover { background: #2471a3; }
        .btn-back {
            flex: 1;
            padding: 11px;
            background: #ecf0f1;
            color: #555;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
            font-family: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-back:hover { background: #d5dbdb; }
        .footer-bar {
            background: #1a252f;
            padding: 12px 30px;
            text-align: center;
            color: #666;
            font-size: 11px;
        }
        .error-msg {
            background: #fdf0ef;
            border: 1px solid #e74c3c;
            color: #c0392b;
            border-radius: 3px;
            padding: 9px 12px;
            font-size: 13px;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
    <div class="login-header">
        <span>e4net PMS</span>
    </div>

    <div class="register-body">
        <div class="register-card">
            <div class="register-card-header">
                <h1>회원가입</h1>
                <p>사용자 정보를 입력해주세요</p>
            </div>
            <div class="register-card-body">

                <form th:action="@{/register}" th:object="${user}" method="post" id="registerForm">

                    <!-- 서버 에러 메시지 -->
                    <div class="error-msg" th:if="${error}" th:text="${error}"></div>

                    <div class="form-row">
                        <!-- 사번 (회원ID) -->
                        <div class="field">
                            <label for="employeeNo">사번 (회원ID) <span class="req">*</span></label>
                            <input type="text" id="employeeNo" th:field="*{employeeNo}"
                                   placeholder="사번을 입력하세요" required>
                        </div>
                        <!-- 이름 -->
                        <div class="field">
                            <label for="name">이름 <span class="req">*</span></label>
                            <input type="text" id="name" th:field="*{name}"
                                   placeholder="이름을 입력하세요" required>
                        </div>
                        <!-- 소속회사 -->
                        <div class="field">
                            <label for="company">소속회사</label>
                            <input type="text" id="company" th:field="*{company}"
                                   placeholder="소속회사를 입력하세요">
                        </div>
                        <!-- 소속부서 -->
                        <div class="field">
                            <label for="department">소속부서</label>
                            <input type="text" id="department" th:field="*{department}"
                                   placeholder="소속부서를 입력하세요">
                        </div>
                        <!-- 직위 -->
                        <div class="field">
                            <label for="position">직위</label>
                            <input type="text" id="position" th:field="*{position}"
                                   placeholder="직위를 입력하세요">
                        </div>
                        <!-- 연락처 -->
                        <div class="field">
                            <label for="phone">연락처</label>
                            <input type="text" id="phone" th:field="*{phone}"
                                   placeholder="예) 010-0000-0000">
                        </div>
                        <!-- 이메일 -->
                        <div class="field full">
                            <label for="email">이메일</label>
                            <input type="email" id="email" th:field="*{email}"
                                   placeholder="이메일 주소를 입력하세요">
                        </div>
                        <!-- 비밀번호 -->
                        <div class="field">
                            <label for="password">비밀번호 <span class="req">*</span></label>
                            <input type="password" id="password" th:field="*{password}"
                                   placeholder="비밀번호를 입력하세요" required>
                        </div>
                        <!-- 비밀번호 확인 -->
                        <div class="field">
                            <label for="confirmPassword">비밀번호 확인 <span class="req">*</span></label>
                            <input type="password" id="confirmPassword" name="confirmPassword"
                                   placeholder="비밀번호를 다시 입력하세요" required>
                        </div>
                    </div>

                    <div class="btn-wrap">
                        <a th:href="@{/}" class="btn-back">취소</a>
                        <button type="submit" class="btn-submit">가입하기</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <div class="footer-bar">
        Copyright &copy; 2024 e4net Co., Ltd. All Rights Reserved.
    </div>
    <script>
        /* 비밀번호 일치 여부 클라이언트 사전 검증 */
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirmPassword').value;
            if (pw !== cpw) {
                e.preventDefault();
                alert('비밀번호가 일치하지 않습니다. 다시 확인해주세요.');
                document.getElementById('confirmPassword').focus();
            }
        });
    </script>
</body>
</html>
