<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이슈관리 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('biz-risk-issue')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>위험관리</span>
            <span class="sep">/</span><span class="current">이슈관리</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">
                    이슈 관리
                    <span th:if="${selectedProject != null}"
                          style="font-size:13px;font-weight:normal;color:#2980b9;margin-left:10px;"
                          th:text="'[ ' + ${selectedProject.projectName} + ' ]'"></span>
                </div>
                <div class="btn-group">
                    <a class="btn btn-secondary" th:href="@{/issue/excel/download}">&#11015; 엑셀 다운로드</a>
                    <button type="button" class="btn btn-secondary" onclick="openUploadModal()">&#11014; 엑셀 업로드</button>
                    <button class="btn btn-primary" onclick="location.href='/issue/new'">&#43; 이슈 등록</button>
                </div>
            </div>

            <!-- 메시지 -->
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>

            <!-- 검색 폼 -->
            <form th:action="@{/issue}" method="get">
                <div class="search-box">
                    <div class="search-row">
                        <span class="search-label">이슈명</span>
                        <input type="text" name="issueName" class="search-input w-lg"
                               th:value="${search.issueName}" placeholder="이슈명 검색">
                        <div class="divider"></div>
                        <span class="search-label">제기자</span>
                        <input type="text" name="raiser" class="search-input w-md"
                               th:value="${search.raiser}" placeholder="제기자 검색">
                        <div class="divider"></div>
                        <span class="search-label">조치상태</span>
                        <select name="actionStatus" class="search-select w-md">
                            <option value="">전체</option>
                            <option th:each="c : ${codes['ISSUE_ACTION_STATUS']}"
                                    th:value="${c.code}" th:text="${c.codeName}"
                                    th:selected="${search.actionStatus == c.code}"></option>
                        </select>
                        <button type="submit" class="btn-search">&#128269; 검색</button>
                    </div>
                </div>
            </form>

            <!-- 목록 테이블 -->
            <div class="table-card">
                <div class="table-card-header">
                    <span class="table-card-title">이슈 목록</span>
                    <span class="table-count">총 <span th:text="${page.totalElements}">0</span>건</span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>NO.</th>
                                <th>관리번호</th>
                                <th style="min-width:250px;">이슈명</th>
                                <th>제기자</th>
                                <th>제기일자</th>
                                <th>조치상태</th>
                                <th>조치일자</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="empty-row" th:if="${page.content.isEmpty()}">
                                <td colspan="8">등록된 이슈가 없습니다.</td>
                            </tr>
                            <tr th:each="r, stat : ${page.content}">
                                <td th:text="${page.number * page.size + stat.count}"></td>
                                <td th:text="${r.issueNo ?: '-'}"></td>
                                <td class="td-left">
                                    <a class="td-link" th:href="@{/issue/{id}(id=${r.id})}" th:text="${r.issueName}"></a>
                                </td>
                                <td th:text="${r.raiser ?: '-'}"></td>
                                <td th:text="${r.raisedDate ?: '-'}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="'badge-' + ${r.actionStatus}"
                                          th:text="${r.actionStatus ?: '-'}"></span>
                                </td>
                                <td th:text="${r.actionDate ?: '-'}"></td>
                                <td>
                                    <button class="btn-sm-del"
                                            th:data-id="${r.id}"
                                            th:data-name="${r.issueName}"
                                            onclick="openDeleteModal(this.dataset.id, this.dataset.name)">삭제</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 페이지네이션 -->
            <div class="pagination" th:if="${page.totalPages > 1}">
                <a th:if="${!page.first}"
                   th:href="@{/issue(page=${page.number - 1}, issueName=${search.issueName}, raiser=${search.raiser}, actionStatus=${search.actionStatus})}">&laquo;</a>
                <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                    <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
                    <a th:unless="${i == page.number}"
                       th:href="@{/issue(page=${i}, issueName=${search.issueName}, raiser=${search.raiser}, actionStatus=${search.actionStatus})}"
                       th:text="${i + 1}"></a>
                </th:block>
                <a th:if="${!page.last}"
                   th:href="@{/issue(page=${page.number + 1}, issueName=${search.issueName}, raiser=${search.raiser}, actionStatus=${search.actionStatus})}">&raquo;</a>
            </div>

        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header red">
            <span class="modal-title">&#128465; 삭제 확인</span>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong id="deleteTargetName"></strong> 을(를) 삭제하시겠습니까?</p>
            <p style="margin-top:8px;color:#718096;font-size:12px;">삭제된 데이터는 복구할 수 없습니다.</p>
        </div>
        <div class="modal-footer">
            <form id="deleteForm" method="post">
                <button type="submit" class="btn btn-delete">삭제</button>
            </form>
            <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
        </div>
    </div>
</div>

<!-- 엑셀 업로드 모달 -->
<div id="uploadModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header">
            <span class="modal-title">&#11014; 엑셀 업로드</span>
            <button class="modal-close" onclick="closeUploadModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p style="margin-bottom:12px; color:#4a5568; font-size:13px;">
                다운로드한 엑셀 파일의 데이터를 수정 후 업로드하세요.<br>
                <strong style="color:#2980b9;">관리번호</strong> 기준으로 기존 데이터는 수정, 신규 데이터는 등록됩니다.
            </p>
            <form id="uploadForm" th:action="@{/issue/excel/upload}" method="post" enctype="multipart/form-data">
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="file" name="excelFile" accept=".xlsx,.xls"
                           class="form-control" style="flex:1;">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="submit" form="uploadForm" class="btn btn-primary">업로드</button>
            <button type="button" class="btn btn-cancel" onclick="closeUploadModal()">취소</button>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    function openDeleteModal(id, name) {
        document.getElementById('deleteTargetName').textContent = name;
        document.getElementById('deleteForm').action = '/issue/' + id + '/delete';
        document.getElementById('deleteModal').classList.add('open');
    }
    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('open');
    }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });

    function openUploadModal()  { document.getElementById('uploadModal').classList.add('open'); }
    function closeUploadModal() { document.getElementById('uploadModal').classList.remove('open'); }
    document.getElementById('uploadModal').addEventListener('click', function(e) {
        if (e.target === this) closeUploadModal();
    });
</script>
</body>
</html>
