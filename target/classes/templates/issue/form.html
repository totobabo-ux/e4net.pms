<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이슈 등록 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('biz-risk-issue')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>위험관리</span>
            <span class="sep">/</span><a href="/issue">이슈관리</a>
            <span class="sep">/</span><span class="current">이슈 등록</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">이슈 등록</div>
                <div class="btn-group">
                    <button type="submit" form="issueForm" class="btn btn-primary">&#10003; 등록</button>
                    <button type="button" class="btn btn-cancel" onclick="location.href='/issue'">&#10005; 취소</button>
                </div>
            </div>

            <form id="issueForm"
                  th:action="@{/issue}"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${issue}">

                <input type="hidden" th:field="*{projectId}">

                <!-- 이슈 기본 정보 -->
                <div class="form-card">
                    <div class="form-card-header">&#128204; 이슈 정보</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <div class="form-cell">
                                <label class="form-label">사업명</label>
                                <span th:text="${session.selectedProject != null ? session.selectedProject.projectName : ''}"
                                      style="font-weight:bold; color:#2c3e50;"></span>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">관리번호</label>
                                <input type="text" class="form-control" th:field="*{issueNo}" placeholder="관리번호 (예: ISS-001)">
                            </div>

                            <div class="form-cell" style="grid-column: 1 / -1;">
                                <label class="form-label">이슈명<span class="req">※</span></label>
                                <input type="text" class="form-control" th:field="*{issueName}" placeholder="이슈명을 입력하세요">
                            </div>

                            <div class="form-cell" style="border-right: 1px solid #d0d8e4;">
                                <label class="form-label">제기자</label>
                                <input type="text" class="form-control" th:field="*{raiser}" placeholder="제기자명">
                            </div>
                            <div class="form-cell" style="border-right: none;">
                                <label class="form-label">제기일자</label>
                                <input type="date" class="form-control" th:field="*{raisedDate}">
                            </div>

                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">이슈내용</label>
                                <textarea class="form-control" th:field="*{issueContent}"
                                          rows="5" placeholder="이슈 내용을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- 조치 계획 -->
                <div class="form-card">
                    <div class="form-card-header">&#128203; 조치 계획</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <div class="form-cell">
                                <label class="form-label">조치계획일자</label>
                                <input type="date" class="form-control" th:field="*{actionPlanDate}">
                            </div>
                            <div class="form-cell"></div>

                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">조치계획내용</label>
                                <textarea class="form-control" th:field="*{actionPlanContent}"
                                          rows="4" placeholder="조치 계획 내용을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- 조치 결과 -->
                <div class="form-card">
                    <div class="form-card-header">&#9989; 조치 결과</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <div class="form-cell">
                                <label class="form-label">조치상태</label>
                                <select class="form-control" th:field="*{actionStatus}">
                                    <option th:each="c : ${codes['ISSUE_ACTION_STATUS']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">조치일자</label>
                                <input type="date" class="form-control" th:field="*{actionDate}">
                            </div>

                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">조치내용</label>
                                <textarea class="form-control" th:field="*{actionContent}"
                                          rows="4" placeholder="조치 결과 내용을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                            <div class="form-cell" style="grid-column: 1 / -1;">
                                <label class="form-label">비고</label>
                                <input type="text" class="form-control" th:field="*{note}" placeholder="비고">
                            </div>

                            <!-- 첨부파일 -->
                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">첨부파일</label>
                                <div class="attach-zone">
                                    <div id="pendingList_label" class="attach-section-label" style="display:none; margin-top:8px;">추가할 파일</div>
                                    <div id="pendingList"></div>
                                    <div class="attach-add-area">
                                        <button type="button" class="btn-attach-add"
                                                onclick="document.getElementById('attachFileInput').click()">
                                            &#128206; 파일 추가
                                        </button>
                                        <span class="attach-hint">여러 파일 동시 선택 가능</span>
                                    </div>
                                    <input type="file" id="attachFileInput" name="attachFiles" multiple style="display:none;">
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    initAttachUpload('attachFileInput', 'pendingList', 'issueForm');
</script>
</body>
</html>
