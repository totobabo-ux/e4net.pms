<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사업 선택 - E4NET PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        body {
            background: #2c3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-header {
            background: #c0392b;
            padding: 0 30px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .login-header span { color: white; font-size: 16px; font-weight: bold; letter-spacing: 1px; }
        .login-header a { color: rgba(255,255,255,0.7); font-size: 12px; text-decoration: none; }
        .login-header a:hover { color: white; }
        .select-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .select-card {
            background: white;
            border-radius: 4px;
            width: 720px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .select-card-header {
            background: #2c3e50;
            padding: 20px 32px;
            text-align: center;
        }
        .select-card-header h1 { color: white; font-size: 18px; font-weight: bold; letter-spacing: 2px; }
        .select-card-header p  { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 4px; }
        .select-card-body { padding: 24px 32px; }
        .project-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .project-table thead th {
            background: #f4f6f8;
            padding: 9px 12px;
            text-align: center;
            border-bottom: 2px solid #ddd;
            color: #444;
            font-weight: bold;
        }
        .project-table tbody tr { cursor: pointer; transition: background 0.15s; }
        .project-table tbody tr:hover { background: #ebf5fb; }
        .project-table tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        .project-table tbody td.td-name { font-weight: bold; color: #2980b9; }
        .empty-msg { text-align: center; color: #999; padding: 32px; }
        .footer-bar {
            background: #1a252f;
            padding: 12px 30px;
            text-align: center;
            color: #666;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="login-header">
        <span>E4NET PMS</span>
        <a th:href="@{/logout}">로그아웃</a>
    </div>

    <div class="select-body">
        <div class="select-card">
            <div class="select-card-header">
                <h1>사업 선택</h1>
                <p>업무를 진행할 사업을 선택하세요</p>
            </div>
            <div class="select-card-body">
                <div th:if="${#lists.isEmpty(projects)}" class="empty-msg">
                    등록된 사업이 없습니다. 관리자에게 문의하세요.
                </div>
                <table class="project-table" th:unless="${#lists.isEmpty(projects)}">
                    <thead>
                        <tr>
                            <th style="text-align:left;">사업명</th>
                            <th>구분</th>
                            <th>PM</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p, stat : ${projects}"
                            th:onclick="|document.getElementById('form-${p.id}').submit()|">
                            <td class="td-name" th:text="${p.projectName}"></td>
                            <td style="text-align:center" th:text="${p.category ?: '-'}"></td>
                            <td style="text-align:center" th:text="${p.pm ?: '-'}"></td>
                            <!-- 숨김 폼: 행 클릭 시 해당 프로젝트 ID 제출 -->
                            <td style="display:none">
                                <form th:id="|form-${p.id}|" th:action="@{/project-select}" method="post">
                                    <input type="hidden" name="projectId" th:value="${p.id}">
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="footer-bar">
        Copyright &copy; 2024 E4NET Co., Ltd. All Rights Reserved.
    </div>
</body>
</html>
