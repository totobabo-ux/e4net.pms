<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 정보 수정 - E4NET PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span class="current">내 정보 수정</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">&#128100; 내 정보 수정</div>
                <div class="btn-group">
                    <button type="submit" form="myProfileForm" class="btn btn-primary">&#10003; 저장</button>
                    <button type="button" class="btn btn-cancel" onclick="location.href='/home'">&#10005; 취소</button>
                </div>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <form id="myProfileForm"
                  th:action="@{/admin/users/my-profile}"
                  method="post"
                  onsubmit="return validateForm()">

                <div class="form-card">
                    <div class="form-card-header">&#128100; 기본 정보</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <div class="form-cell">
                                <label class="form-label">사번 (회원ID)</label>
                                <input type="text" class="form-control"
                                       th:value="${user.employeeNo}"
                                       readonly style="background:#f7f8fa; cursor:default;">
                            </div>
                            <div class="form-cell">
                                <label class="form-label">이름<span class="req">※</span></label>
                                <input type="text" name="name" class="form-control"
                                       th:value="${user.name}" placeholder="이름을 입력하세요" required>
                            </div>

                            <div class="form-cell">
                                <label class="form-label">소속회사</label>
                                <input type="text" name="company" class="form-control"
                                       th:value="${user.company}" placeholder="소속회사">
                            </div>
                            <div class="form-cell">
                                <label class="form-label">소속부서</label>
                                <input type="text" name="department" class="form-control"
                                       th:value="${user.department}" placeholder="소속부서">
                            </div>

                            <div class="form-cell">
                                <label class="form-label">직위</label>
                                <input type="text" name="position" class="form-control"
                                       th:value="${user.position}" placeholder="직위">
                            </div>
                            <div class="form-cell">
                                <label class="form-label">연락처</label>
                                <input type="text" name="phone" class="form-control"
                                       th:value="${user.phone}" placeholder="예) 010-0000-0000">
                            </div>

                            <div class="form-cell" style="grid-column: 1 / -1;">
                                <label class="form-label">이메일</label>
                                <input type="email" name="email" class="form-control"
                                       th:value="${user.email}" placeholder="이메일 주소">
                            </div>

                        </div>
                    </div>
                </div>

                <!-- 비밀번호 변경 -->
                <div class="form-card" style="margin-top:16px;">
                    <div class="form-card-header">&#128274; 비밀번호 변경
                        <span style="font-size:12px;font-weight:normal;color:#aaa;">(변경하지 않으려면 비워두세요)</span>
                    </div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">
                            <div class="form-cell">
                                <label class="form-label">새 비밀번호</label>
                                <input type="password" id="newPassword" name="newPassword" class="form-control"
                                       placeholder="새 비밀번호 입력">
                            </div>
                            <div class="form-cell">
                                <label class="form-label">새 비밀번호 확인</label>
                                <input type="password" id="confirmNewPassword" class="form-control"
                                       placeholder="새 비밀번호 재입력">
                            </div>
                        </div>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    function validateForm() {
        var pw  = document.getElementById('newPassword').value;
        var cpw = document.getElementById('confirmNewPassword').value;
        if (pw && pw !== cpw) {
            alert('새 비밀번호가 일치하지 않습니다.');
            document.getElementById('confirmNewPassword').focus();
            return false;
        }
        return true;
    }
</script>
</body>
</html>
