<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무흐름 목록 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('exec-analysis-flow')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업수행</span>
            <span class="sep">/</span><span>분석</span>
            <span class="sep">/</span><span class="current">업무흐름</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">
                    업무흐름 목록
                    <span th:if="${selectedProject != null}"
                          style="font-size:13px;font-weight:normal;color:#2980b9;margin-left:10px;"
                          th:text="'[ ' + ${selectedProject.projectName} + ' ]'"></span>
                </div>
                <div class="btn-group">
                    <a class="btn btn-primary" href="/business-flow/new">&#43; 등록</a>
                </div>
            </div>

            <!-- 알림 메시지 -->
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>

            <!-- 검색 폼 -->
            <form th:action="@{/business-flow}" method="get">
                <div class="search-box">
                    <div class="search-row">
                        <span class="search-label">시스템구분</span>
                        <input type="text" name="systemCategory" class="search-input w-md"
                               th:value="${search.systemCategory}" placeholder="시스템구분 검색">
                        <div class="divider"></div>
                        <span class="search-label">업무구분</span>
                        <input type="text" name="bizCategory" class="search-input w-md"
                               th:value="${search.bizCategory}" placeholder="업무구분 검색">
                        <div class="divider"></div>
                        <span class="search-label">프로세스명</span>
                        <input type="text" name="processName" class="search-input w-lg"
                               th:value="${search.processName}" placeholder="프로세스명 검색">
                        <button type="submit" class="btn-search">&#128269; 검색</button>
                    </div>
                </div>
            </form>

            <!-- 목록 테이블 -->
            <div class="table-card">
                <div class="table-card-header">
                    <span class="table-card-title">업무흐름 목록</span>
                    <span class="table-count">총 <span th:text="${page.totalElements}">0</span>건</span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th style="width:44px;">No.</th>
                                <th style="width:120px;">시스템구분</th>
                                <th style="width:120px;">업무구분</th>
                                <th style="width:100px;">프로세스ID</th>
                                <th>프로세스명</th>
                                <th style="width:50px;">첨부</th>
                                <th style="width:80px;">관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="empty-row" th:if="${page.content.isEmpty()}">
                                <td colspan="7">등록된 업무흐름이 없습니다.</td>
                            </tr>
                            <tr th:each="flow, stat : ${page.content}">
                                <td th:text="${page.number * page.size + stat.count}"></td>
                                <td th:text="${flow.systemCategory ?: '-'}"></td>
                                <td th:text="${flow.bizCategory ?: '-'}"></td>
                                <td th:text="${flow.processId ?: '-'}"></td>
                                <td class="td-left">
                                    <a class="td-link"
                                       th:href="@{/business-flow/{id}(id=${flow.id})}"
                                       th:text="${flow.processName}"></a>
                                </td>
                                <td style="text-align:center;">&#128196;</td>
                                <td>
                                    <button class="btn-sm-edit"
                                            th:data-href="@{/business-flow/{id}(id=${flow.id})}"
                                            onclick="location.href=this.dataset.href">상세</button>
                                    <button class="btn-sm-del"
                                            th:data-id="${flow.id}"
                                            th:data-name="${flow.processName}"
                                            onclick="openDeleteModal(this.dataset.id, this.dataset.name)">삭제</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 페이지네이션 -->
            <div class="pagination" th:if="${page.totalPages > 1}">
                <a th:if="${!page.first}"
                   th:href="@{/business-flow(page=${page.number - 1}, size=${page.size},
                       systemCategory=${search.systemCategory}, bizCategory=${search.bizCategory},
                       processName=${search.processName})}">&laquo;</a>
                <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                    <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
                    <a th:unless="${i == page.number}"
                       th:href="@{/business-flow(page=${i}, size=${page.size},
                           systemCategory=${search.systemCategory}, bizCategory=${search.bizCategory},
                           processName=${search.processName})}"
                       th:text="${i + 1}"></a>
                </th:block>
                <a th:if="${!page.last}"
                   th:href="@{/business-flow(page=${page.number + 1}, size=${page.size},
                       systemCategory=${search.systemCategory}, bizCategory=${search.bizCategory},
                       processName=${search.processName})}">&raquo;</a>
            </div>

        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header red">
            <span class="modal-title">&#128465; 삭제 확인</span>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong id="deleteTargetName"></strong> 을(를) 삭제하시겠습니까?</p>
            <p style="margin-top:8px;color:#718096;font-size:12px;">삭제된 데이터는 복구할 수 없습니다.</p>
        </div>
        <div class="modal-footer">
            <form id="deleteForm" method="post">
                <button type="submit" class="btn btn-delete">삭제</button>
            </form>
            <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    function openDeleteModal(id, name) {
        document.getElementById('deleteTargetName').textContent = name;
        document.getElementById('deleteForm').action = '/business-flow/' + id + '/delete';
        document.getElementById('deleteModal').classList.add('open');
    }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });
</script>
</body>
</html>
