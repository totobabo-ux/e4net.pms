<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요구사항 추적 - E4NET PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* ── 분할 레이아웃 ───────────────────────────────────── */
        .trace-layout {
            display: flex;
            gap: 14px;
            height: calc(100vh - 148px);
            overflow: hidden;
        }
        .trace-left {
            flex: 1 1 50%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
            min-width: 0;
        }
        .trace-right {
            flex: 1 1 50%;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow: hidden;
            min-width: 0;
        }

        /* ── 좌측 검색 폼 ───────────────────────────────────── */
        .trace-search {
            background: #fff;
            border: 1px solid #c8d0dc;
            border-radius: 6px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .trace-search input,
        .trace-search select {
            height: 30px;
            border: 1px solid #c8d0dc;
            border-radius: 4px;
            padding: 0 8px;
            font-size: 12px;
            color: #2d3748;
            outline: none;
        }
        .trace-search input { flex: 1; }
        .trace-search select { width: 90px; }
        .trace-search input:focus,
        .trace-search select:focus { border-color: #2980b9; }
        .btn-trace-search {
            height: 30px; padding: 0 12px;
            background: #2980b9; color: #fff;
            border: none; border-radius: 4px;
            font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        .btn-trace-search:hover { background: #2471a3; }

        /* ── 좌측 요구사항 테이블 ───────────────────────────── */
        .trace-req-card {
            flex: 1;
            background: #fff;
            border: 1px solid #c8d0dc;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .trace-card-header {
            background: #f7f8fa;
            border-bottom: 2px solid #2980b9;
            padding: 7px 14px;
            font-size: 12px; font-weight: bold; color: #2d3748;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .trace-card-count { font-size: 11px; color: #2980b9; font-weight: bold; }
        .trace-req-wrap { overflow-y: auto; flex: 1; }
        .trace-req-wrap table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .trace-req-wrap thead th {
            position: sticky; top: 0; z-index: 1;
            background: #fff; color: #2980b9; font-weight: bold;
            border-bottom: 2px solid #ff4444;
            border-right: 1px solid #d0d8e4;
            padding: 7px 6px; text-align: center; white-space: nowrap;
        }
        .trace-req-wrap thead th:last-child { border-right: none; }
        .trace-req-wrap tbody td {
            border-bottom: 1px solid #d0d8e4;
            border-right: 1px solid #d0d8e4;
            padding: 6px;
            color: #2d3748; text-align: center; vertical-align: middle;
        }
        .trace-req-wrap tbody td:last-child { border-right: none; }
        .trace-req-wrap tbody td.td-left { text-align: left; }
        .trace-req-wrap tbody tr:nth-child(even) { background: #f5f7fa; }
        .trace-req-wrap tbody tr:hover { background: #ebf4ff; cursor: pointer; }
        .trace-req-wrap tbody tr.selected { background: #2980b9 !important; color: #fff; }
        .trace-req-wrap tbody tr.selected td { color: #fff; }

        /* ── 페이지네이션 (좌측) ─────────────────────────────── */
        .trace-pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 3px; padding: 6px 0; flex-shrink: 0;
            border-top: 1px solid #e8ecf0;
        }
        .trace-pagination a, .trace-pagination span {
            display: inline-flex; align-items: center; justify-content: center;
            width: 24px; height: 24px;
            border: 1px solid #e2e8f0; border-radius: 50%;
            font-size: 11px; text-decoration: none; color: #4a5568; background: #fff;
        }
        .trace-pagination a:hover { border-color: #ff4444; color: #ff4444; }
        .trace-pagination .active { background: #ff4444; color: #fff; border-color: #ff4444; font-weight: bold; }

        /* ── 우측 패널 ─────────────────────────────────────── */
        .trace-right-card {
            flex: 1;
            background: #fff;
            border: 1px solid #c8d0dc;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 선택된 요구사항 정보 배너 */
        .req-banner {
            background: #f0f7ff;
            border-bottom: 1px solid #c8d0dc;
            padding: 8px 16px;
            font-size: 12px; color: #4a5568;
            display: flex; align-items: center; gap: 10px;
            flex-shrink: 0; min-height: 36px;
        }
        .req-banner.empty { color: #a0aec0; font-style: italic; }
        .req-banner-code { font-weight: bold; color: #2980b9; }
        .req-banner-title { color: #2c3e50; }
        .req-banner-badge {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            background: #e2e8f0; color: #4a5568; font-weight: bold;
        }

        /* 탭 */
        .trace-tabs {
            display: flex;
            border-bottom: 2px solid #ff4444;
            background: #f7f8fa;
            flex-shrink: 0;
        }
        .trace-tab {
            padding: 8px 14px;
            font-size: 12px; font-weight: bold; color: #718096;
            border: none; background: none; cursor: pointer;
            border-bottom: 3px solid transparent; margin-bottom: -2px;
            transition: color 0.15s;
            white-space: nowrap;
        }
        .trace-tab:hover { color: #2980b9; }
        .trace-tab.active { color: #ff4444; border-bottom-color: #ff4444; }
        .trace-tab.disabled { color: #c8d0dc; cursor: not-allowed; }
        .trace-tab .tab-badge {
            display: inline-block; background: #e2e8f0; color: #718096;
            font-size: 10px; padding: 1px 5px; border-radius: 8px; margin-left: 4px;
        }
        .trace-tab.active .tab-badge { background: #ff4444; color: #fff; }

        /* 탭 콘텐츠 영역 */
        .trace-content-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 14px;
            border-bottom: 1px solid #e8ecf0;
            flex-shrink: 0;
        }
        .trace-content-title { font-size: 12px; font-weight: bold; color: #2d3748; }
        .btn-trace-save {
            height: 28px; padding: 0 16px;
            background: #2980b9; color: #fff;
            border: none; border-radius: 4px;
            font-size: 12px; font-weight: bold; cursor: pointer;
        }
        .btn-trace-save:hover { background: #2471a3; }
        .btn-trace-save:disabled { background: #a0c4e0; cursor: not-allowed; }

        .trace-tab-wrap { overflow-y: auto; flex: 1; }
        .trace-tab-wrap table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .trace-tab-wrap thead th {
            position: sticky; top: 0; z-index: 1;
            background: #fff; color: #2980b9; font-weight: bold;
            border-bottom: 2px solid #ff4444;
            border-right: 1px solid #d0d8e4;
            padding: 7px 8px; text-align: center; white-space: nowrap;
        }
        .trace-tab-wrap thead th:last-child { border-right: none; }
        .trace-tab-wrap tbody td {
            border-bottom: 1px solid #d0d8e4;
            border-right: 1px solid #d0d8e4;
            padding: 6px 8px; color: #2d3748;
            text-align: center; vertical-align: middle;
        }
        .trace-tab-wrap tbody td:last-child { border-right: none; }
        .trace-tab-wrap tbody td.td-left { text-align: left; }
        .trace-tab-wrap tbody tr:nth-child(even) { background: #f5f7fa; }
        .trace-tab-wrap tbody tr:hover { background: #ebf4ff; }
        .trace-tab-wrap tbody tr.mapped { background: #f0fff4; }
        .trace-tab-wrap tbody tr.mapped td { color: #276749; }

        /* 미구현 탭 안내 */
        .tab-not-impl {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 200px; color: #a0aec0; font-size: 13px; gap: 10px;
        }
        .tab-not-impl .icon { font-size: 32px; }

        /* 빈 상태 */
        .trace-empty {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex: 1; color: #a0aec0; font-size: 13px; gap: 10px;
        }
        .trace-empty .icon { font-size: 36px; }

        /* 체크박스 */
        input[type=checkbox].trace-chk { width: 14px; height: 14px; cursor: pointer; accent-color: #2980b9; }
    </style>
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('biz-scope-traceability')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>범위관리</span>
            <span class="sep">/</span><span class="current">요구사항 추적</span>
        </div>

        <div class="content" style="padding-bottom:0;">

            <div class="trace-layout">

                <!-- ══ 좌측: 요구사항 목록 ══════════════════════════ -->
                <div class="trace-left">

                    <!-- 검색 폼 -->
                    <form method="get" action="/req-traceability" class="trace-search">
                        <input type="text" name="title" th:value="${title}"
                               placeholder="제목 검색" style="min-width:0;">
                        <select name="status">
                            <option value="">전체</option>
                            <option value="등록"      th:selected="${status == '등록'}">등록</option>
                            <option value="분석중"    th:selected="${status == '분석중'}">분석중</option>
                            <option value="개발중"    th:selected="${status == '개발중'}">개발중</option>
                            <option value="완료"      th:selected="${status == '완료'}">완료</option>
                            <option value="보류"      th:selected="${status == '보류'}">보류</option>
                        </select>
                        <button type="submit" class="btn-trace-search">&#128269;</button>
                    </form>

                    <!-- 요구사항 목록 카드 -->
                    <div class="trace-req-card">
                        <div class="trace-card-header">
                            <span>요구사항 목록</span>
                            <span class="trace-card-count"
                                  th:text="'총 ' + ${reqPage.totalElements} + '건'"></span>
                        </div>
                        <div class="trace-req-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width:100px; white-space:nowrap;">코드</th>
                                        <th>제목</th>
                                        <th style="width:50px;">상태</th>
                                        <th style="width:34px;">우선</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${reqPage.content.isEmpty()}">
                                        <td colspan="4" style="padding:30px;color:#a0aec0;">
                                            요구사항이 없습니다.
                                        </td>
                                    </tr>
                                    <tr th:each="req : ${reqPage.content}"
                                        th:data-id="${req.id}"
                                        th:data-code="${req.reqCode}"
                                        th:data-title="${req.title}"
                                        th:data-status="${req.status}"
                                        th:data-priority="${req.priority}"
                                        onclick="selectReq(this)">
                                        <td th:text="${req.reqCode ?: '-'}"
                                            style="font-size:11px; font-family:monospace; white-space:nowrap;"></td>
                                        <td class="td-left" th:text="${req.title}"></td>
                                        <td th:text="${req.status}"
                                            style="font-size:11px;"></td>
                                        <td th:text="${req.priority}"
                                            style="font-size:11px;"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- 페이지네이션 -->
                        <div class="trace-pagination" th:if="${reqPage.totalPages > 1}">
                            <a th:if="${!reqPage.first}"
                               th:href="@{/req-traceability(page=${reqPage.number - 1}, title=${title}, status=${status})}">&laquo;</a>
                            <th:block th:each="i : ${#numbers.sequence(0, reqPage.totalPages - 1)}">
                                <span th:if="${i == reqPage.number}" class="active" th:text="${i + 1}"></span>
                                <a th:unless="${i == reqPage.number}"
                                   th:href="@{/req-traceability(page=${i}, title=${title}, status=${status})}"
                                   th:text="${i + 1}"></a>
                            </th:block>
                            <a th:if="${!reqPage.last}"
                               th:href="@{/req-traceability(page=${reqPage.number + 1}, title=${title}, status=${status})}">&raquo;</a>
                        </div>
                    </div>

                </div>

                <!-- ══ 우측: 연관 탭 ════════════════════════════════ -->
                <div class="trace-right">
                    <div class="trace-right-card">

                        <!-- 선택된 요구사항 배너 -->
                        <div class="req-banner empty" id="reqBanner">
                            &#8592; 좌측에서 요구사항을 선택하세요
                        </div>

                        <!-- 탭 -->
                        <div class="trace-tabs">
                            <button class="trace-tab active" data-type="BUSINESS_FLOW"
                                    onclick="switchTab(this)">업무흐름 <span class="tab-badge" id="badge-BUSINESS_FLOW">0</span></button>
                            <button class="trace-tab" data-type="MENU"
                                    onclick="switchTab(this)">메뉴구조 <span class="tab-badge" id="badge-MENU">0</span></button>
                            <button class="trace-tab" data-type="SCREEN"
                                    onclick="switchTab(this)">화면목록 <span class="tab-badge" id="badge-SCREEN">0</span></button>
                            <button class="trace-tab" data-type="INTERFACE"
                                    onclick="switchTab(this)">인터페이스</button>
                            <button class="trace-tab" data-type="PROGRAM"
                                    onclick="switchTab(this)">프로그램</button>
                            <button class="trace-tab" data-type="UNIT_TEST"
                                    onclick="switchTab(this)">단위테스트</button>
                            <button class="trace-tab" data-type="INTEGRATION_TEST"
                                    onclick="switchTab(this)">통합테스트</button>
                        </div>

                        <!-- 콘텐츠 헤더 -->
                        <div class="trace-content-header">
                            <span class="trace-content-title" id="contentTitle">업무흐름 연관관계</span>
                            <button class="btn-trace-save" id="btnSave"
                                    onclick="saveMapping()" disabled>&#10003; 저장</button>
                        </div>

                        <!-- 탭 콘텐츠 -->
                        <div class="trace-tab-wrap" id="tabWrap">
                            <div class="trace-empty">
                                <div class="icon">&#128203;</div>
                                <div>요구사항을 선택하면 연관 목록이 표시됩니다.</div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    /* ── 상태 ─────────────────────────────────────────────── */
    let selectedReqId   = null;
    let currentType     = 'BUSINESS_FLOW';
    let currentItems    = [];   // 현재 탭 항목
    let badgeCounts     = {};   // 탭별 연관 건수 캐시

    const TAB_META = {
        BUSINESS_FLOW:    { title: '업무흐름 연관관계',    cols: ['프로세스ID', '업무흐름명'],       impl: true  },
        MENU:             { title: '메뉴구조 연관관계',    cols: ['메뉴코드', '메뉴명'],             impl: true  },
        SCREEN:           { title: '화면목록 연관관계',    cols: ['URL', '화면명'],                  impl: true  },
        INTERFACE:        { title: '인터페이스 연관관계',  cols: [],                                 impl: false },
        PROGRAM:          { title: '프로그램 연관관계',    cols: [],                                 impl: false },
        UNIT_TEST:        { title: '단위테스트 연관관계',  cols: [],                                 impl: false },
        INTEGRATION_TEST: { title: '통합테스트 연관관계', cols: [],                                 impl: false },
    };

    /* ── 요구사항 선택 ────────────────────────────────────── */
    function selectReq(row) {
        // 이전 선택 해제
        document.querySelectorAll('.trace-req-wrap tbody tr.selected')
                .forEach(r => r.classList.remove('selected'));
        row.classList.add('selected');

        selectedReqId = row.dataset.id;
        const code    = row.dataset.code || '-';
        const title   = row.dataset.title;
        const status  = row.dataset.status;

        // 배너 업데이트
        const banner = document.getElementById('reqBanner');
        banner.classList.remove('empty');
        banner.innerHTML =
            `<span class="req-banner-code">${esc(code)}</span>` +
            `<span class="req-banner-title">${esc(title)}</span>` +
            `<span class="req-banner-badge">${esc(status)}</span>`;

        document.getElementById('btnSave').disabled = false;

        // 배지 초기화 후 현재 탭 로드
        badgeCounts = {};
        loadTab(currentType);
    }

    /* ── 탭 전환 ──────────────────────────────────────────── */
    function switchTab(btn) {
        document.querySelectorAll('.trace-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        currentType = btn.dataset.type;
        document.getElementById('contentTitle').textContent =
                TAB_META[currentType]?.title || currentType;
        if (selectedReqId) loadTab(currentType);
    }

    /* ── 탭 데이터 로드 ───────────────────────────────────── */
    function loadTab(type) {
        const meta = TAB_META[type];
        const wrap = document.getElementById('tabWrap');

        if (!meta.impl) {
            wrap.innerHTML = `
                <div class="tab-not-impl">
                    <div class="icon">&#128679;</div>
                    <div>해당 기능은 준비 중입니다.</div>
                </div>`;
            return;
        }

        wrap.innerHTML = '<div style="padding:20px;text-align:center;color:#a0aec0;">불러오는 중...</div>';

        fetch(`/req-traceability/tab-data?reqId=${selectedReqId}&type=${type}`)
            .then(r => r.json())
            .then(items => {
                currentItems = items;
                renderTabTable(items, meta.cols);
                // 배지 업데이트
                const mappedCount = items.filter(i => i.mapped).length;
                badgeCounts[type] = mappedCount;
                const badge = document.getElementById('badge-' + type);
                if (badge) badge.textContent = mappedCount;
            })
            .catch(() => {
                wrap.innerHTML = '<div style="padding:20px;text-align:center;color:#e53e3e;">데이터를 불러오지 못했습니다.</div>';
            });
    }

    /* ── 탭 테이블 렌더링 ─────────────────────────────────── */
    function renderTabTable(items, cols) {
        const wrap = document.getElementById('tabWrap');
        if (items.length === 0) {
            wrap.innerHTML = `
                <div class="tab-not-impl">
                    <div class="icon">&#128203;</div>
                    <div>등록된 항목이 없습니다.</div>
                </div>`;
            return;
        }

        const headerCells = cols.map(c => `<th>${esc(c)}</th>`).join('');
        const rows = items.map(item => {
            const checked = item.mapped ? 'checked' : '';
            const rowClass = item.mapped ? 'mapped' : '';
            return `<tr class="${rowClass}" id="row-${item.id}">
                <td style="width:36px;">
                    <input type="checkbox" class="trace-chk"
                           data-id="${item.id}" ${checked}
                           onchange="onCheck(this, ${item.id})">
                </td>
                <td style="font-size:11px;font-family:monospace;">${esc(item.code || '-')}</td>
                <td class="td-left">${esc(item.name)}</td>
            </tr>`;
        }).join('');

        wrap.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th style="width:36px;">&#10003;</th>
                        ${headerCells}
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    /* ── 체크 변경 ────────────────────────────────────────── */
    function onCheck(chk, id) {
        const row = document.getElementById('row-' + id);
        if (chk.checked) {
            row.classList.add('mapped');
        } else {
            row.classList.remove('mapped');
        }
    }

    /* ── 저장 ─────────────────────────────────────────────── */
    function saveMapping() {
        if (!selectedReqId) return;
        const meta = TAB_META[currentType];
        if (!meta.impl) return;

        const checkedIds = Array.from(
            document.querySelectorAll('.trace-chk:checked')
        ).map(c => parseInt(c.dataset.id));

        fetch('/req-traceability/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reqId: parseInt(selectedReqId), type: currentType, targetIds: checkedIds })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                // 배지 업데이트
                const badge = document.getElementById('badge-' + currentType);
                if (badge) badge.textContent = checkedIds.length;
                showToast('저장되었습니다.');
            }
        })
        .catch(() => showToast('저장에 실패했습니다.', true));
    }

    /* ── 토스트 메시지 ────────────────────────────────────── */
    function showToast(msg, isError = false) {
        let toast = document.getElementById('traceToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'traceToast';
            toast.style.cssText =
                'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);' +
                'padding:10px 24px;border-radius:6px;font-size:13px;font-weight:bold;' +
                'color:#fff;z-index:9999;transition:opacity 0.3s;';
            document.body.appendChild(toast);
        }
        toast.style.background = isError ? '#e53e3e' : '#2980b9';
        toast.style.opacity = '1';
        toast.textContent = msg;
        setTimeout(() => { toast.style.opacity = '0'; }, 2000);
    }

    /* ── XSS 방지 ─────────────────────────────────────────── */
    function esc(str) {
        return String(str ?? '')
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
</script>
</body>
</html>
