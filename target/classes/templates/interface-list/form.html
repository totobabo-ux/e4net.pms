<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'create'} ? '인터페이스 등록 - E4NET PMS' : '인터페이스 수정 - E4NET PMS'">인터페이스 폼</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('exec-design-interface')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업수행</span>
            <span class="sep">/</span><span>설계</span>
            <span class="sep">/</span><a href="/interface-list">인터페이스 목록</a>
            <span class="sep">/</span>
            <span class="current" th:text="${mode == 'create'} ? '등록' : '수정'">등록</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title" th:text="${mode == 'create'} ? '인터페이스 등록' : '인터페이스 수정'">인터페이스 등록</div>
                <div class="btn-group">
                    <button type="submit" form="ifaceForm" class="btn btn-primary">
                        &#10003; <span th:text="${mode == 'create'} ? '등록' : '저장'">등록</span>
                    </button>
                    <button type="button" class="btn btn-cancel" onclick="location.href='/interface-list'">&#10005; 취소</button>
                </div>
            </div>

            <form id="ifaceForm"
                  th:action="${mode == 'create'} ? @{/interface-list} : @{/interface-list/{id}/edit(id=${iface.id})}"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${iface}">

                <input type="hidden" th:field="*{projectId}">

                <div class="form-card">
                    <div class="form-card-header">&#128197; 인터페이스 정보</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <!-- 사업명 -->
                            <div class="form-cell" style="grid-column: 1 / -1;">
                                <label class="form-label">사업명</label>
                                <span th:text="${session.selectedProject != null ? session.selectedProject.projectName : ''}"
                                      style="font-weight:bold; color:#2c3e50;"></span>
                            </div>

                            <!-- 인터페이스ID / 인터페이스명 -->
                            <div class="form-cell" style="border-right: 1px solid #d0d8e4;">
                                <label class="form-label">인터페이스ID</label>
                                <input type="text" class="form-control" th:field="*{interfaceId}"
                                       placeholder="예: SEPP_0001">
                            </div>
                            <div class="form-cell" style="border-right: none;">
                                <label class="form-label">인터페이스명<span class="req">※</span></label>
                                <input type="text" class="form-control" th:field="*{interfaceName}"
                                       placeholder="인터페이스명을 입력하세요">
                            </div>

                            <!-- 연계구분 / 인터페이스방식 -->
                            <div class="form-cell" style="border-right: 1px solid #d0d8e4;">
                                <label class="form-label">연계구분</label>
                                <select class="form-control" th:field="*{linkType}">
                                    <option value="">-- 선택 --</option>
                                    <option th:each="c : ${codes['INTERFACE_LINK_TYPE']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell" style="border-right: none;">
                                <label class="form-label">인터페이스방식</label>
                                <select class="form-control" th:field="*{interfaceMethod}">
                                    <option value="">-- 선택 --</option>
                                    <option th:each="c : ${codes['INTERFACE_METHOD']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>

                            <!-- 송신시스템 / 수신시스템 -->
                            <div class="form-cell" style="border-right: 1px solid #d0d8e4; align-items:flex-start;">
                                <label class="form-label" style="padding-top:4px;">송신 시스템(Source)</label>
                                <textarea class="form-control" th:field="*{sourceSystem}"
                                          rows="3" placeholder="송신 시스템명을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>
                            <div class="form-cell" style="border-right: none; align-items:flex-start;">
                                <label class="form-label" style="padding-top:4px;">수신 시스템(Target)</label>
                                <textarea class="form-control" th:field="*{targetSystem}"
                                          rows="3" placeholder="수신 시스템명을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                            <!-- 발생주기 / 비고 -->
                            <div class="form-cell" style="border-right: 1px solid #d0d8e4;">
                                <label class="form-label">발생주기</label>
                                <select class="form-control" th:field="*{occurrenceCycle}">
                                    <option value="">-- 선택 --</option>
                                    <option th:each="c : ${codes['INTERFACE_CYCLE']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell" style="border-right: none;">
                                <label class="form-label">비고</label>
                                <input type="text" class="form-control" th:field="*{note}"
                                       placeholder="비고사항 입력">
                            </div>

                            <!-- 첨부파일 -->
                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">첨부파일</label>
                                <div class="attach-zone">
                                    <div th:if="${not #lists.isEmpty(iface.attachments)}">
                                        <div class="attach-section-label">기존 첨부파일</div>
                                        <div th:each="att : ${iface.attachments}" class="attach-row attach-existing">
                                            <span class="attach-icon">&#128196;</span>
                                            <span class="attach-name" th:text="${att.fileName}"></span>
                                            <span class="attach-size" th:text="${att.fileSizeDisplay}"></span>
                                            <form th:action="@{/interface-list/{id}/attachment/{attId}/delete(id=${iface.id},attId=${att.id})}"
                                                  method="post" style="margin:0; flex-shrink:0;">
                                                <button type="submit" class="btn-sm-del"
                                                        onclick="return confirm('이 첨부파일을 삭제하시겠습니까?')">삭제</button>
                                            </form>
                                        </div>
                                    </div>
                                    <div id="pendingList_label" class="attach-section-label" style="display:none; margin-top:8px;">추가할 파일</div>
                                    <div id="pendingList"></div>
                                    <div class="attach-add-area">
                                        <button type="button" class="btn-attach-add"
                                                onclick="document.getElementById('attachFileInput').click()">
                                            &#128206; 파일 추가
                                        </button>
                                        <span class="attach-hint">여러 파일 동시 선택 가능</span>
                                    </div>
                                    <input type="file" id="attachFileInput" name="attachFiles" multiple style="display:none;">
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    initAttachUpload('attachFileInput', 'pendingList', 'ifaceForm');
</script>
</body>
</html>
