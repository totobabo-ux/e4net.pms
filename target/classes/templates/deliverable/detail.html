<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산출물 상세 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* 조회/수정 모드 전환 */
        #editSection { display: none; }
        #viewSection { display: block; }
    </style>
</head>
<body>

<!-- 상단 헤더 -->
<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">

    <!-- 좌측 사이드바 -->
    <aside th:replace="~{layout/fragments :: sidebar('biz-standard-output')}"></aside>

    <!-- 메인 콘텐츠 -->
    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>표준관리</span>
            <span class="sep">/</span><a href="/deliverable">산출물관리</a>
            <span class="sep">/</span><span class="current">산출물 상세</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">산출물 상세</div>
                <!-- 조회 모드 버튼 -->
                <div class="btn-group" id="viewButtons">
                    <button type="button" class="btn btn-edit" onclick="switchToEdit()">&#9998; 수정</button>
                    <button type="button" class="btn btn-delete" onclick="openDeleteModal()">&#128465; 삭제</button>
                    <a class="btn btn-list" href="/deliverable">&#9776; 목록</a>
                </div>
                <!-- 수정 모드 버튼 -->
                <div class="btn-group" id="editButtons" style="display:none;">
                    <button type="submit" form="deliverableEditForm" class="btn btn-primary">&#10003; 저장</button>
                    <button type="button" class="btn btn-cancel" onclick="switchToView()">&#10005; 취소</button>
                </div>
            </div>

            <!-- 성공 메시지 -->
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <!-- ───────────── 조회 섹션 ───────────── -->
            <div id="viewSection">
                <div class="detail-card">
                    <div class="detail-card-header">&#128196; 산출물 정보</div>
                    <div class="detail-grid">

                        <div class="detail-cell">
                            <span class="detail-label">사업명</span>
                            <span class="detail-value" th:text="${deliverable.projectName ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">산출물 구분</span>
                            <span class="detail-value" th:text="${deliverable.deliverableType ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell">
                            <span class="detail-label">분류1</span>
                            <span class="detail-value" th:text="${deliverable.category1 ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">분류2</span>
                            <span class="detail-value" th:text="${deliverable.category2 ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell">
                            <span class="detail-label">코드</span>
                            <span class="detail-value" th:text="${deliverable.code ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">산출물ID</span>
                            <span class="detail-value" th:text="${deliverable.deliverableId ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1;">
                            <span class="detail-label">산출물명</span>
                            <span class="detail-value" th:text="${deliverable.name}">-</span>
                        </div>

                        <div class="detail-cell">
                            <span class="detail-label">작성여부</span>
                            <span class="detail-value" th:text="${deliverable.writtenYn ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">단계</span>
                            <span class="detail-value" th:text="${deliverable.stage ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell">
                            <span class="detail-label">작성자</span>
                            <span class="detail-value" th:text="${deliverable.writer ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell"></div>

                        <div class="detail-cell" style="grid-column: 1 / -1; align-items: flex-start;">
                            <span class="detail-label" style="padding-top:4px;">비고</span>
                            <span class="detail-value" style="white-space:pre-wrap;"
                                  th:text="${deliverable.note ?: '-'}">-</span>
                        </div>

                    </div>
                </div>
            </div>

            <!-- ───────────── 수정 섹션 ───────────── -->
            <div id="editSection">
                <form id="deliverableEditForm"
                      th:action="@{/deliverable/{id}/edit(id=${deliverable.id})}"
                      method="post"
                      th:object="${deliverable}">

                    <div class="form-card">
                        <div class="form-card-header">&#128196; 산출물 정보 수정</div>
                        <div class="form-card-body">
                            <div class="form-grid-2col">

                                <!-- 사업명 / 산출물 구분※ -->
                                <div class="form-cell">
                                    <label class="form-label">사업명</label>
                                    <input type="hidden" th:field="*{projectId}">
                                    <span th:text="${session.selectedProject != null ? session.selectedProject.projectName : deliverable.projectName}"
                                          style="font-weight:bold; color:#2c3e50; padding: 6px 12px;"></span>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">산출물 구분<span class="req">※</span></label>
                                    <div style="flex:1;">
                                        <select class="form-control" th:field="*{deliverableType}"
                                                th:classappend="${#fields.hasErrors('deliverableType')} ? 'is-invalid'">
                                            <option value="">-- 구분 선택 --</option>
                                            <option value="관리산출물">관리산출물</option>
                                            <option value="개발산출물">개발산출물</option>
                                        </select>
                                        <span class="field-error" th:if="${#fields.hasErrors('deliverableType')}"
                                              th:errors="*{deliverableType}"></span>
                                    </div>
                                </div>

                                <!-- 분류1※ / 분류2※ -->
                                <div class="form-cell">
                                    <label class="form-label">분류1<span class="req">※</span></label>
                                    <div style="flex:1;">
                                        <input type="text" class="form-control" th:field="*{category1}"
                                               th:classappend="${#fields.hasErrors('category1')} ? 'is-invalid'"
                                               placeholder="분류1 입력">
                                        <span class="field-error" th:if="${#fields.hasErrors('category1')}"
                                              th:errors="*{category1}"></span>
                                    </div>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">분류2<span class="req">※</span></label>
                                    <div style="flex:1;">
                                        <input type="text" class="form-control" th:field="*{category2}"
                                               th:classappend="${#fields.hasErrors('category2')} ? 'is-invalid'"
                                               placeholder="분류2 입력">
                                        <span class="field-error" th:if="${#fields.hasErrors('category2')}"
                                              th:errors="*{category2}"></span>
                                    </div>
                                </div>

                                <!-- 코드※ / 산출물ID※ -->
                                <div class="form-cell">
                                    <label class="form-label">코드<span class="req">※</span></label>
                                    <div style="flex:1;">
                                        <input type="text" class="form-control" th:field="*{code}"
                                               th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"
                                               placeholder="코드 입력">
                                        <span class="field-error" th:if="${#fields.hasErrors('code')}"
                                              th:errors="*{code}"></span>
                                    </div>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">산출물ID<span class="req">※</span></label>
                                    <div style="flex:1;">
                                        <input type="text" class="form-control" th:field="*{deliverableId}"
                                               th:classappend="${#fields.hasErrors('deliverableId')} ? 'is-invalid'"
                                               placeholder="예: OUT-001">
                                        <span class="field-error" th:if="${#fields.hasErrors('deliverableId')}"
                                              th:errors="*{deliverableId}"></span>
                                    </div>
                                </div>

                                <!-- 산출물명※ (전체 너비) -->
                                <div class="form-cell" style="grid-column: 1 / -1;">
                                    <label class="form-label">산출물명<span class="req">※</span></label>
                                    <div style="flex:1;">
                                        <input type="text" class="form-control" th:field="*{name}"
                                               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                               placeholder="산출물명을 입력하세요">
                                        <span class="field-error" th:if="${#fields.hasErrors('name')}"
                                              th:errors="*{name}"></span>
                                    </div>
                                </div>

                                <!-- 작성여부 / 단계 -->
                                <div class="form-cell">
                                    <label class="form-label">작성여부</label>
                                    <select class="form-control" th:field="*{writtenYn}">
                                        <option value="">-- 선택 --</option>
                                        <option value="Y">작성</option>
                                        <option value="N">미작성</option>
                                    </select>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">단계</label>
                                    <select class="form-control" th:field="*{stage}">
                                        <option value="">-- 단계 선택 --</option>
                                        <option value="미도래">미도래</option>
                                        <option value="미착수">미착수</option>
                                        <option value="수행">수행</option>
                                        <option value="PL확인">PL확인</option>
                                        <option value="PM확인">PM확인</option>
                                        <option value="PMO확인">PMO확인</option>
                                        <option value="완료">완료</option>
                                    </select>
                                </div>

                                <!-- 작성자 / 빈칸 -->
                                <div class="form-cell">
                                    <label class="form-label">작성자</label>
                                    <input type="text" class="form-control" th:field="*{writer}" placeholder="작성자명">
                                </div>
                                <div class="form-cell"></div>

                                <!-- 비고 (전체 너비) -->
                                <div class="form-cell" style="grid-column: 1 / -1; align-items: flex-start;">
                                    <label class="form-label">비고</label>
                                    <textarea class="form-control" th:field="*{note}"
                                              rows="3" placeholder="비고 사항을 입력하세요"
                                              style="resize:vertical;"></textarea>
                                </div>

                            </div>
                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header red">
            <span class="modal-title">&#128465; 삭제 확인</span>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong th:text="${deliverable.name}">산출물</strong> 을(를) 삭제하시겠습니까?</p>
            <p style="margin-top:8px;color:#718096;font-size:12px;">삭제된 데이터는 복구할 수 없습니다.</p>
        </div>
        <div class="modal-footer">
            <form th:action="@{/deliverable/{id}/delete(id=${deliverable.id})}" method="post">
                <button type="submit" class="btn btn-delete">삭제</button>
            </form>
            <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    /* 수정 모드 전환 */
    function switchToEdit() {
        document.getElementById('viewSection').style.display = 'none';
        document.getElementById('editSection').style.display = 'block';
        document.getElementById('viewButtons').style.display = 'none';
        document.getElementById('editButtons').style.display = 'flex';
    }

    /* 조회 모드 전환 */
    function switchToView() {
        document.getElementById('viewSection').style.display = 'block';
        document.getElementById('editSection').style.display = 'none';
        document.getElementById('viewButtons').style.display = 'flex';
        document.getElementById('editButtons').style.display = 'none';
    }

    /* 삭제 모달 */
    function openDeleteModal()  { document.getElementById('deleteModal').classList.add('open'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });

    /* 유효성 오류 시 수정 모드 자동 진입 (컨트롤러에서 editMode=true 전달) */
    (function() {
        var editMode = /*[[${editMode != null && editMode}]]*/ false;
        if (editMode) switchToEdit();
    })();
</script>
</body>
</html>
