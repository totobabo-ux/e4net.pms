<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>산출물관리 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 상단 헤더 -->
<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">

    <!-- 좌측 사이드바 -->
    <aside th:replace="~{layout/fragments :: sidebar('biz-standard-output')}"></aside>

    <!-- 메인 콘텐츠 -->
    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>표준관리</span>
            <span class="sep">/</span><span class="current">산출물관리</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">
                    산출물 관리
                    <span th:if="${selectedProject != null}"
                          style="font-size:13px;font-weight:normal;color:#2980b9;margin-left:10px;"
                          th:text="'[ ' + ${selectedProject.projectName} + ' ]'"></span>
                </div>
                <div class="btn-group">
                    <a class="btn btn-secondary" th:href="@{/deliverable/excel/download}">&#11015; 엑셀 다운로드</a>
                    <button type="button" class="btn btn-secondary" onclick="openUploadModal()">&#11014; 엑셀 업로드</button>
                    <button class="btn btn-primary" onclick="location.href='/deliverable/new'">&#43; 산출물 등록</button>
                </div>
            </div>

            <!-- 메시지 -->
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
            <div class="alert alert-danger"  th:if="${errorMessage}"   th:text="${errorMessage}"></div>

            <!-- 검색 폼 -->
            <form th:action="@{/deliverable}" method="get">
                <div class="search-box">
                    <div class="search-row">
                        <span class="search-label">산출물 구분</span>
                        <select name="deliverableType" class="search-select w-md">
                            <option value="">전체</option>
                            <option value="관리산출물" th:selected="${search.deliverableType == '관리산출물'}">관리산출물</option>
                            <option value="개발산출물" th:selected="${search.deliverableType == '개발산출물'}">개발산출물</option>
                        </select>
                        <div class="divider"></div>
                        <span class="search-label">단계</span>
                        <select name="stage" class="search-select w-md">
                            <option value="">전체</option>
                            <option value="미도래"   th:selected="${search.stage == '미도래'}">미도래</option>
                            <option value="미착수"   th:selected="${search.stage == '미착수'}">미착수</option>
                            <option value="수행"     th:selected="${search.stage == '수행'}">수행</option>
                            <option value="PL확인"   th:selected="${search.stage == 'PL확인'}">PL확인</option>
                            <option value="PM확인"   th:selected="${search.stage == 'PM확인'}">PM확인</option>
                            <option value="PMO확인"  th:selected="${search.stage == 'PMO확인'}">PMO확인</option>
                            <option value="완료"     th:selected="${search.stage == '완료'}">완료</option>
                        </select>
                        <div class="divider"></div>
                        <span class="search-label">산출물명</span>
                        <input type="text" name="name" class="search-input w-lg"
                               th:value="${search.name}" placeholder="산출물명 검색">
                        <button type="submit" class="btn-search">&#128269; 검색</button>
                    </div>
                </div>
            </form>

            <!-- 목록 테이블 -->
            <div class="table-card">
                <div class="table-card-header">
                    <span class="table-card-title">산출물 목록</span>
                    <span class="table-count">총 <span th:text="${page.totalElements}">0</span>건</span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>NO.</th>
                                <th>산출물구분</th>
                                <th>분류1</th>
                                <th>분류2</th>
                                <th>산출물ID</th>
                                <th style="min-width:220px;">산출물명</th>
                                <th>단계</th>
                                <th>작성여부</th>
                                <th>작성자</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="empty-row" th:if="${page.content.isEmpty()}">
                                <td colspan="10">등록된 산출물이 없습니다.</td>
                            </tr>
                            <tr th:each="d, stat : ${page.content}">
                                <td th:text="${page.number * page.size + stat.count}"></td>
                                <td th:text="${d.deliverableType ?: '-'}"></td>
                                <td th:text="${d.category1 ?: '-'}"></td>
                                <td th:text="${d.category2 ?: '-'}"></td>
                                <td th:text="${d.deliverableId ?: '-'}"></td>
                                <td class="td-left">
                                    <a class="td-link" th:href="@{/deliverable/{id}(id=${d.id})}" th:text="${d.name}"></a>
                                </td>
                                <td th:text="${d.stage ?: '-'}"></td>
                                <td th:text="${d.writtenYn ?: '-'}"></td>
                                <td th:text="${d.writer ?: '-'}"></td>
                                <td>
                                    <button class="btn-sm-edit"
                                            th:data-href="@{/deliverable/{id}/edit(id=${d.id})}"
                                            onclick="location.href=this.dataset.href">수정</button>
                                    <button class="btn-sm-del"
                                            th:data-id="${d.id}"
                                            th:data-name="${d.name}"
                                            onclick="openDeleteModal(this.dataset.id, this.dataset.name)">삭제</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 페이지네이션 -->
            <div class="pagination" th:if="${page.totalPages > 1}">
                <a th:if="${!page.first}"
                   th:href="@{/deliverable(page=${page.number - 1}, deliverableType=${search.deliverableType}, stage=${search.stage}, name=${search.name})}">&laquo;</a>
                <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                    <span th:if="${i == page.number}" class="active" th:text="${i + 1}"></span>
                    <a th:unless="${i == page.number}"
                       th:href="@{/deliverable(page=${i}, deliverableType=${search.deliverableType}, stage=${search.stage}, name=${search.name})}"
                       th:text="${i + 1}"></a>
                </th:block>
                <a th:if="${!page.last}"
                   th:href="@{/deliverable(page=${page.number + 1}, deliverableType=${search.deliverableType}, stage=${search.stage}, name=${search.name})}">&raquo;</a>
            </div>

        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header red">
            <span class="modal-title">&#128465; 삭제 확인</span>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong id="deleteTargetName"></strong> 을(를) 삭제하시겠습니까?</p>
            <p style="margin-top:8px;color:#718096;font-size:12px;">삭제된 데이터는 복구할 수 없습니다.</p>
        </div>
        <div class="modal-footer">
            <form id="deleteForm" method="post">
                <button type="submit" class="btn btn-delete">삭제</button>
            </form>
            <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
        </div>
    </div>
</div>

<!-- 엑셀 업로드 모달 -->
<div id="uploadModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header">
            <span class="modal-title">&#11014; 엑셀 업로드</span>
            <button class="modal-close" onclick="closeUploadModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p style="margin-bottom:12px; color:#4a5568; font-size:13px;">
                다운로드한 엑셀 파일의 데이터를 수정 후 업로드하세요.<br>
                <strong style="color:#2980b9;">산출물ID</strong> 기준으로 기존 데이터는 수정, 신규 데이터는 등록됩니다.
            </p>
            <form id="uploadForm" th:action="@{/deliverable/excel/upload}" method="post" enctype="multipart/form-data">
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="file" id="excelFileInput" name="excelFile" accept=".xlsx,.xls"
                           class="form-control" style="flex:1;">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="submit" form="uploadForm" class="btn btn-primary">업로드</button>
            <button type="button" class="btn btn-cancel" onclick="closeUploadModal()">취소</button>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    function openDeleteModal(id, name) {
        document.getElementById('deleteTargetName').textContent = name;
        document.getElementById('deleteForm').action = '/deliverable/' + id + '/delete';
        document.getElementById('deleteModal').classList.add('open');
    }
    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('open');
    }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });

    function openUploadModal()  { document.getElementById('uploadModal').classList.add('open'); }
    function closeUploadModal() { document.getElementById('uploadModal').classList.remove('open'); }
    document.getElementById('uploadModal').addEventListener('click', function(e) {
        if (e.target === this) closeUploadModal();
    });
</script>
</body>
</html>
