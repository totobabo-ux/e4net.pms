<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위험 등록 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('biz-risk-risk')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>위험관리</span>
            <span class="sep">/</span><a href="/risk">위험관리</a>
            <span class="sep">/</span><span class="current">위험 등록</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">위험 등록</div>
                <div class="btn-group">
                    <button type="submit" form="riskForm" class="btn btn-primary">&#10003; 등록</button>
                    <button type="button" class="btn btn-cancel" onclick="location.href='/risk'">&#10005; 취소</button>
                </div>
            </div>

            <form id="riskForm"
                  th:action="@{/risk}"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${risk}">

                <input type="hidden" th:field="*{projectId}">

                <!-- 기본 정보 -->
                <div class="form-card">
                    <div class="form-card-header">&#9888; 위험 기본 정보</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <div class="form-cell">
                                <label class="form-label">사업명</label>
                                <span th:text="${session.selectedProject != null ? session.selectedProject.projectName : ''}"
                                      style="font-weight:bold; color:#2c3e50;"></span>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">위험코드</label>
                                <input type="text" class="form-control" th:field="*{riskCode}" placeholder="위험코드 (예: RSK-001)">
                            </div>

                            <div class="form-cell" style="grid-column: 1 / -1;">
                                <label class="form-label">위험명<span class="req">※</span></label>
                                <input type="text" class="form-control" th:field="*{riskName}" placeholder="위험명을 입력하세요">
                            </div>

                            <div class="form-cell" style="border-right: 1px solid #f0f2f5;">
                                <label class="form-label">위험유형</label>
                                <select class="form-control" th:field="*{riskType}">
                                    <option value="">선택</option>
                                    <option th:each="c : ${codes['RISK_TYPE']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell" style="border-right: none;">
                                <label class="form-label">식별일자</label>
                                <input type="date" class="form-control" th:field="*{identifiedDate}">
                            </div>

                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">위험설명</label>
                                <textarea class="form-control" th:field="*{description}"
                                          rows="4" placeholder="위험에 대한 설명을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- 위험 평가 -->
                <div class="form-card">
                    <div class="form-card-header">&#128202; 위험 평가</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <div class="form-cell">
                                <label class="form-label">발생가능성</label>
                                <select class="form-control" th:field="*{probability}">
                                    <option th:each="c : ${codes['RISK_PROBABILITY']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">영향도</label>
                                <select class="form-control" th:field="*{impact}">
                                    <option th:each="c : ${codes['RISK_IMPACT']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>

                            <div class="form-cell">
                                <label class="form-label">위험등급</label>
                                <select class="form-control" th:field="*{riskLevel}">
                                    <option value="">선택</option>
                                    <option th:each="c : ${codes['RISK_LEVEL']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">위험상태</label>
                                <select class="form-control" th:field="*{status}">
                                    <option th:each="c : ${codes['RISK_STATUS']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>

                        </div>
                    </div>
                </div>

                <!-- 대응 정보 -->
                <div class="form-card">
                    <div class="form-card-header">&#128736; 대응 정보</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <div class="form-cell">
                                <label class="form-label">대응전략</label>
                                <select class="form-control" th:field="*{responseStrategy}">
                                    <option value="">선택</option>
                                    <option th:each="c : ${codes['RISK_STRATEGY']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">담당자</label>
                                <input type="text" class="form-control" th:field="*{owner}" placeholder="담당자명">
                            </div>

                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">대응계획</label>
                                <textarea class="form-control" th:field="*{responsePlan}"
                                          rows="4" placeholder="대응계획을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">활동결과</label>
                                <textarea class="form-control" th:field="*{activityResult}"
                                          rows="4" placeholder="활동결과를 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                            <!-- 첨부파일 -->
                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">첨부파일</label>
                                <div class="attach-zone">
                                    <div id="pendingList_label" class="attach-section-label" style="display:none; margin-top:8px;">추가할 파일</div>
                                    <div id="pendingList"></div>
                                    <div class="attach-add-area">
                                        <button type="button" class="btn-attach-add"
                                                onclick="document.getElementById('attachFileInput').click()">
                                            &#128206; 파일 추가
                                        </button>
                                        <span class="attach-hint">여러 파일 동시 선택 가능</span>
                                    </div>
                                    <input type="file" id="attachFileInput" name="attachFiles" multiple style="display:none;">
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    initAttachUpload('attachFileInput', 'pendingList', 'riskForm');
</script>
</body>
</html>
