<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이슈 상세 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        #editSection { display:none; }
        #viewSection { display:block; }
    </style>
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('biz-risk-issue')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>위험관리</span>
            <span class="sep">/</span><a href="/issue">이슈관리</a>
            <span class="sep">/</span><span class="current">이슈 상세</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">이슈 상세</div>
                <div class="btn-group" id="viewButtons">
                    <button type="button" class="btn btn-edit" onclick="switchToEdit()">&#9998; 수정</button>
                    <button type="button" class="btn btn-delete" onclick="openDeleteModal()">&#128465; 삭제</button>
                    <a class="btn btn-list" href="/issue">&#9776; 목록</a>
                </div>
                <div class="btn-group" id="editButtons" style="display:none;">
                    <button type="submit" form="issueEditForm" class="btn btn-primary">&#10003; 저장</button>
                    <button type="button" class="btn btn-cancel" onclick="switchToView()">&#10005; 취소</button>
                </div>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <!-- ───────── 조회 섹션 ───────── -->
            <div id="viewSection">

                <!-- 이슈 정보 -->
                <div class="detail-card">
                    <div class="detail-card-header">&#128204; 이슈 정보</div>
                    <div class="detail-grid">

                        <div class="detail-cell">
                            <span class="detail-label">사업명</span>
                            <span class="detail-value" th:text="${issue.projectName}">-</span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">관리번호</span>
                            <span class="detail-value" th:text="${issue.issueNo ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1;">
                            <span class="detail-label">이슈명</span>
                            <span class="detail-value" th:text="${issue.issueName}">-</span>
                        </div>

                        <div class="detail-cell" style="border-right: 1px solid #d0d8e4;">
                            <span class="detail-label">제기자</span>
                            <span class="detail-value" th:text="${issue.raiser ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell" style="border-right: none;">
                            <span class="detail-label">제기일자</span>
                            <span class="detail-value" th:text="${issue.raisedDate ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">이슈내용</span>
                            <span class="detail-value" style="white-space:pre-wrap;"
                                  th:text="${issue.issueContent ?: '-'}">-</span>
                        </div>

                    </div>
                </div>

                <!-- 조치 계획 -->
                <div class="detail-card">
                    <div class="detail-card-header">&#128203; 조치 계획</div>
                    <div class="detail-grid">

                        <div class="detail-cell">
                            <span class="detail-label">조치계획일자</span>
                            <span class="detail-value" th:text="${issue.actionPlanDate ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell"></div>

                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">조치계획내용</span>
                            <span class="detail-value" style="white-space:pre-wrap;"
                                  th:text="${issue.actionPlanContent ?: '-'}">-</span>
                        </div>

                    </div>
                </div>

                <!-- 조치 결과 -->
                <div class="detail-card">
                    <div class="detail-card-header">&#9989; 조치 결과</div>
                    <div class="detail-grid">

                        <div class="detail-cell">
                            <span class="detail-label">조치상태</span>
                            <span class="badge"
                                  th:classappend="'badge-' + ${issue.actionStatus}"
                                  th:text="${issue.actionStatus ?: '-'}"></span>
                        </div>
                        <div class="detail-cell">
                            <span class="detail-label">조치일자</span>
                            <span class="detail-value" th:text="${issue.actionDate ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">조치내용</span>
                            <span class="detail-value" style="white-space:pre-wrap;"
                                  th:text="${issue.actionContent ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1;">
                            <span class="detail-label">비고</span>
                            <span class="detail-value" th:text="${issue.note ?: '-'}">-</span>
                        </div>

                        <!-- 첨부파일 목록 (조회) -->
                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">첨부파일</span>
                            <div style="flex:1; min-width:0;">
                                <div th:if="${#lists.isEmpty(issue.attachments)}" class="attach-empty">첨부파일 없음</div>
                                <div th:each="att : ${issue.attachments}" class="attach-row attach-view">
                                    <span class="attach-icon">&#128196;</span>
                                    <a th:href="@{/issue/{id}/attachment/{attId}/download(id=${issue.id},attId=${att.id})}"
                                       class="attach-name td-link" th:text="${att.fileName}"></a>
                                    <span class="attach-size" th:text="${att.fileSizeDisplay}"></span>
                                    <span style="font-size:12px; color:#2980b9;">&#11015; 다운로드</span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>

            <!-- ───────── 수정 섹션 ───────── -->
            <div id="editSection">
                <form id="issueEditForm"
                      th:action="@{/issue/{id}/edit(id=${issue.id})}"
                      method="post"
                      enctype="multipart/form-data"
                      th:object="${issue}">

                    <input type="hidden" th:field="*{projectId}">

                    <!-- 이슈 정보 수정 -->
                    <div class="form-card">
                        <div class="form-card-header">&#128204; 이슈 정보 수정</div>
                        <div class="form-card-body">
                            <div class="form-grid-2col">

                                <div class="form-cell">
                                    <label class="form-label">사업명</label>
                                    <span th:text="${session.selectedProject != null ? session.selectedProject.projectName : issue.projectName}"
                                          style="font-weight:bold; color:#2c3e50;"></span>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">관리번호</label>
                                    <input type="text" class="form-control" th:field="*{issueNo}" placeholder="관리번호 (예: ISS-001)">
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1;">
                                    <label class="form-label">이슈명<span class="req">※</span></label>
                                    <input type="text" class="form-control" th:field="*{issueName}" placeholder="이슈명을 입력하세요">
                                </div>

                                <div class="form-cell" style="border-right: 1px solid #d0d8e4;">
                                    <label class="form-label">제기자</label>
                                    <input type="text" class="form-control" th:field="*{raiser}" placeholder="제기자명">
                                </div>
                                <div class="form-cell" style="border-right: none;">
                                    <label class="form-label">제기일자</label>
                                    <input type="date" class="form-control" th:field="*{raisedDate}">
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">이슈내용</label>
                                    <textarea class="form-control" th:field="*{issueContent}"
                                              rows="5" placeholder="이슈 내용을 입력하세요"
                                              style="resize:vertical;"></textarea>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- 조치 계획 수정 -->
                    <div class="form-card">
                        <div class="form-card-header">&#128203; 조치 계획 수정</div>
                        <div class="form-card-body">
                            <div class="form-grid-2col">

                                <div class="form-cell">
                                    <label class="form-label">조치계획일자</label>
                                    <input type="date" class="form-control" th:field="*{actionPlanDate}">
                                </div>
                                <div class="form-cell"></div>

                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">조치계획내용</label>
                                    <textarea class="form-control" th:field="*{actionPlanContent}"
                                              rows="4" placeholder="조치 계획 내용을 입력하세요"
                                              style="resize:vertical;"></textarea>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- 조치 결과 수정 -->
                    <div class="form-card">
                        <div class="form-card-header">&#9989; 조치 결과 수정</div>
                        <div class="form-card-body">
                            <div class="form-grid-2col">

                                <div class="form-cell">
                                    <label class="form-label">조치상태</label>
                                    <select class="form-control" th:field="*{actionStatus}">
                                        <option th:each="c : ${codes['ISSUE_ACTION_STATUS']}"
                                                th:value="${c.code}" th:text="${c.codeName}"></option>
                                    </select>
                                </div>
                                <div class="form-cell">
                                    <label class="form-label">조치일자</label>
                                    <input type="date" class="form-control" th:field="*{actionDate}">
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">조치내용</label>
                                    <textarea class="form-control" th:field="*{actionContent}"
                                              rows="4" placeholder="조치 결과 내용을 입력하세요"
                                              style="resize:vertical;"></textarea>
                                </div>

                                <div class="form-cell" style="grid-column: 1 / -1;">
                                    <label class="form-label">비고</label>
                                    <input type="text" class="form-control" th:field="*{note}" placeholder="비고">
                                </div>

                                <!-- 첨부파일 (수정) -->
                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">첨부파일</label>
                                    <div class="attach-zone">
                                        <div th:if="${not #lists.isEmpty(issue.attachments)}">
                                            <div class="attach-section-label">기존 첨부파일</div>
                                            <div th:each="att : ${issue.attachments}" class="attach-row attach-existing">
                                                <span class="attach-icon">&#128196;</span>
                                                <span class="attach-name" th:text="${att.fileName}"></span>
                                                <span class="attach-size" th:text="${att.fileSizeDisplay}"></span>
                                                <form th:action="@{/issue/{id}/attachment/{attId}/delete(id=${issue.id},attId=${att.id})}"
                                                      method="post" style="margin:0; flex-shrink:0;">
                                                    <button type="submit" class="btn-sm-del"
                                                            onclick="return confirm('이 첨부파일을 삭제하시겠습니까?')">삭제</button>
                                                </form>
                                            </div>
                                        </div>
                                        <div id="editPendingList_label" class="attach-section-label" style="display:none; margin-top:8px;">추가할 파일</div>
                                        <div id="editPendingList"></div>
                                        <div class="attach-add-area">
                                            <button type="button" class="btn-attach-add"
                                                    onclick="document.getElementById('editFileInput').click()">
                                                &#128206; 파일 추가
                                            </button>
                                            <span class="attach-hint">여러 파일 동시 선택 가능</span>
                                        </div>
                                        <input type="file" id="editFileInput" name="attachFiles" multiple style="display:none;">
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header red">
            <span class="modal-title">&#128465; 삭제 확인</span>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong th:text="${issue.issueName ?: '선택한 항목'}">이슈</strong> 을(를) 삭제하시겠습니까?</p>
            <p style="margin-top:8px;color:#718096;font-size:12px;">삭제된 데이터는 복구할 수 없습니다.</p>
        </div>
        <div class="modal-footer">
            <form th:action="@{/issue/{id}/delete(id=${issue.id})}" method="post">
                <button type="submit" class="btn btn-delete">삭제</button>
            </form>
            <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    function switchToEdit() {
        document.getElementById('viewSection').style.display = 'none';
        document.getElementById('editSection').style.display = 'block';
        document.getElementById('viewButtons').style.display = 'none';
        document.getElementById('editButtons').style.display = 'flex';
    }
    function switchToView() {
        document.getElementById('viewSection').style.display = 'block';
        document.getElementById('editSection').style.display = 'none';
        document.getElementById('viewButtons').style.display = 'flex';
        document.getElementById('editButtons').style.display = 'none';
    }
    function openDeleteModal()  { document.getElementById('deleteModal').classList.add('open'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });
    initAttachUpload('editFileInput', 'editPendingList', 'issueEditForm');
</script>
</body>
</html>
