<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'create'} ? '사업 등록 - E4NET PMS' : '사업 수정 - E4NET PMS'">사업 폼 - E4NET PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* ── project-form.html 전용 스타일 ── */
        .form-card { padding: 28px 32px; }
        .form-actions .btn { height: 36px; padding: 0 28px; font-size: 14px; }
    </style>
</head>
<body>

<!-- 상단 헤더 -->
<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">

    <!-- 좌측 사이드바 -->
    <aside th:replace="~{layout/fragments :: sidebar('admin-project-list')}"></aside>

    <!-- 메인 콘텐츠 -->
    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span>
            <span>사업 계획</span>
            <span class="sep">/</span>
            <a href="/projects">사업정보 관리</a>
            <span class="sep">/</span>
            <span class="current" th:text="${mode == 'create'} ? '사업 등록' : '사업 수정'"></span>
        </div>

        <div class="content">
            <div class="page-title" th:text="${mode == 'create'} ? '사업 등록' : '사업 수정'"></div>

            <form th:action="${mode == 'create'} ? @{/projects} : @{/projects/{id}/edit(id=${project.id})}"
                  method="post" th:object="${project}" id="projectForm">

                <div class="form-card">

                    <!-- 기본 정보 -->
                    <div class="form-section-title">기본 정보</div>
                    <div class="form-grid">
                        <div class="form-group full" style="grid-column: 1 / -1;">
                            <label class="form-label">프로젝트명 <span class="required">※</span></label>
                            <input type="text" th:field="*{projectName}"
                                   th:classappend="${#fields.hasErrors('projectName')} ? 'error' : ''"
                                   class="form-control" placeholder="프로젝트명을 입력하세요">
                            <span class="form-error" th:if="${#fields.hasErrors('projectName')}"
                                  th:errors="*{projectName}"></span>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">구분</label>
                            <select th:field="*{category}" class="form-control">
                                <option value="">선택</option>
                                <option th:each="c : ${codes['PROJECT_CATEGORY']}"
                                        th:value="${c.code}" th:text="${c.codeName}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">회사</label>
                            <input type="text" th:field="*{company}" class="form-control" placeholder="회사명을 직접 입력하세요">
                        </div>
                    </div>

                    <!-- 거래처 정보 -->
                    <div class="form-section-title">거래처 정보</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">발주처</label>
                            <input type="text" th:field="*{orderer}" class="form-control" placeholder="발주처명">
                        </div>
                        <div class="form-group">
                            <label class="form-label">계약처</label>
                            <input type="text" th:field="*{contractor}" class="form-control" placeholder="계약처명">
                        </div>
                        <div class="form-group">
                            <label class="form-label">PM</label>
                            <input type="text" th:field="*{pm}" class="form-control" placeholder="PM 이름">
                        </div>
                    </div>

                    <!-- 계약 정보 -->
                    <div class="form-section-title">계약 정보</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">계약 시작일</label>
                            <input type="date" th:field="*{contractStart}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">계약 종료일</label>
                            <input type="date" th:field="*{contractEnd}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">계약금액 (원)</label>
                            <!-- 콤마 표시용 텍스트 입력 -->
                            <input type="text" id="contractAmountDisplay" class="form-control"
                                   placeholder="0" autocomplete="off"
                                   oninput="syncAmount(this)">
                            <!-- 실제 서버 전송용 숫자 hidden -->
                            <input type="hidden" th:field="*{contractAmount}" id="contractAmount">
                        </div>
                    </div>

                </div><!-- /form-card -->

                <!-- 하단 버튼 -->
                <div class="form-actions">
                    <a href="/projects" class="btn btn-secondary">취소</a>
                    <button type="submit" class="btn btn-primary"
                            th:text="${mode == 'create'} ? '등록' : '수정'">저장</button>
                    <form th:if="${mode == 'edit'}"
                          th:action="@{/projects/{id}/delete(id=${project.id})}" method="post"
                          onsubmit="return confirm('정말 삭제하시겠습니까?')" style="margin:0;">
                        <button type="submit" class="btn btn-danger">삭제</button>
                    </form>
                </div>

            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    /* 계약금액 콤마 포맷 처리 */
    function syncAmount(el) {
        var raw = el.value.replace(/[^0-9]/g, '');
        el.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
        document.getElementById('contractAmount').value = raw || '';
    }

    /* 페이지 로드 시 기존 값 콤마 표시 (수정 모드) */
    window.addEventListener('DOMContentLoaded', function () {
        var hidden = document.getElementById('contractAmount');
        var display = document.getElementById('contractAmountDisplay');
        if (hidden && hidden.value) {
            display.value = Number(hidden.value).toLocaleString('ko-KR');
        }
    });
</script>
</body>
</html>
