<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료실 상세 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css">
    <style>
        #editSection { display: none; }
        #viewSection { display: block; }
    </style>
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('community-archive-list')}"></aside>

    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>커뮤니티</span>
            <span class="sep">/</span><a href="/archive">자료실</a>
            <span class="sep">/</span><span class="current">자료 상세</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title">자료 상세</div>
                <!-- 조회 모드 버튼 -->
                <div class="btn-group" id="viewButtons">
                    <button type="button" class="btn btn-edit" onclick="switchToEdit()">&#9998; 수정</button>
                    <button type="button" class="btn btn-delete" onclick="openDeleteModal()">&#128465; 삭제</button>
                    <a class="btn btn-list" href="/archive">&#9776; 목록</a>
                </div>
                <!-- 수정 모드 버튼 -->
                <div class="btn-group" id="editButtons" style="display:none;">
                    <button type="submit" form="communityEditForm" class="btn btn-primary">&#10003; 저장</button>
                    <button type="button" class="btn btn-cancel" onclick="switchToView()">&#10005; 취소</button>
                </div>
            </div>

            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <!-- ───────── 조회 섹션 ───────── -->
            <div id="viewSection">
                <div class="detail-card">
                    <div class="detail-card-header">&#128196; 자료 정보</div>
                    <div class="detail-grid">

                        <div class="detail-cell" style="grid-column: 1 / -1;">
                            <span class="detail-label">제목</span>
                            <span class="detail-value" th:text="${community.title}">-</span>
                        </div>

                        <div class="detail-cell" style="border-right: 1px solid #d0d8e4;">
                            <span class="detail-label">작성자</span>
                            <span class="detail-value" th:text="${community.writer ?: '-'}">-</span>
                        </div>
                        <div class="detail-cell" style="border-right: none;">
                            <span class="detail-label">작성일</span>
                            <span class="detail-value" th:text="${community.postDate ?: '-'}">-</span>
                        </div>

                        <div class="detail-cell" style="grid-column: 1 / -1; align-items: flex-start;">
                            <span class="detail-label" style="padding-top:4px;">내용</span>
                            <div class="ql-snow" style="border:none; flex:1; min-width:0;">
                                <div class="ql-editor" style="padding:4px 0;"
                                     th:utext="${community.content ?: ''}"></div>
                            </div>
                        </div>

                        <!-- 첨부파일 목록 (조회) -->
                        <div class="detail-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                            <span class="detail-label" style="padding-top:4px;">첨부파일</span>
                            <div style="flex:1; min-width:0;">
                                <div th:if="${#lists.isEmpty(community.attachments)}" class="attach-empty">첨부파일 없음</div>
                                <div th:each="att : ${community.attachments}" class="attach-row attach-view">
                                    <span class="attach-icon">&#128196;</span>
                                    <a th:href="@{/archive/{id}/attachment/{attId}/download(id=${community.id},attId=${att.id})}"
                                       class="attach-name td-link" th:text="${att.fileName}"></a>
                                    <span class="attach-size" th:text="${att.fileSizeDisplay}"></span>
                                    <span style="font-size:12px; color:#2980b9;">&#11015; 다운로드</span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- ───────── 수정 섹션 ───────── -->
            <div id="editSection">
                <form id="communityEditForm"
                      th:action="@{/archive/{id}/edit(id=${community.id})}"
                      method="post"
                      enctype="multipart/form-data"
                      th:object="${community}">

                    <div class="form-card">
                        <div class="form-card-header">&#128196; 자료 정보 수정</div>
                        <div class="form-card-body">
                            <div class="form-grid-2col">

                                <!-- 제목 -->
                                <div class="form-cell" style="grid-column: 1 / -1;">
                                    <label class="form-label">제목<span class="req">※</span></label>
                                    <div style="flex:1;">
                                        <input type="text" class="form-control" th:field="*{title}"
                                               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                               placeholder="제목을 입력하세요">
                                        <span class="field-error" th:if="${#fields.hasErrors('title')}"
                                              th:errors="*{title}"></span>
                                    </div>
                                </div>

                                <!-- 작성자 / 작성일 -->
                                <div class="form-cell" style="border-right: 1px solid #d0d8e4;">
                                    <label class="form-label">작성자</label>
                                    <input type="text" class="form-control" th:field="*{writer}" placeholder="작성자">
                                </div>
                                <div class="form-cell" style="border-right: none;">
                                    <label class="form-label">작성일</label>
                                    <input type="date" class="form-control" th:field="*{postDate}">
                                </div>

                                <!-- 내용 -->
                                <div class="form-cell" style="grid-column: 1 / -1; align-items: flex-start;">
                                    <label class="form-label">내용</label>
                                    <div style="flex:1; min-width:0;">
                                        <div id="editEditor" style="height:300px; background:#fff;"></div>
                                        <input type="hidden" id="editContentInput" th:field="*{content}">
                                    </div>
                                </div>

                                <!-- 첨부파일 (수정) -->
                                <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                    <label class="form-label">첨부파일</label>
                                    <div class="attach-zone">
                                        <div th:if="${not #lists.isEmpty(community.attachments)}">
                                            <div class="attach-section-label">기존 첨부파일</div>
                                            <div th:each="att : ${community.attachments}" class="attach-row attach-existing">
                                                <span class="attach-icon">&#128196;</span>
                                                <span class="attach-name" th:text="${att.fileName}"></span>
                                                <span class="attach-size" th:text="${att.fileSizeDisplay}"></span>
                                                <form th:action="@{/archive/{id}/attachment/{attId}/delete(id=${community.id},attId=${att.id})}"
                                                      method="post" style="margin:0; flex-shrink:0;">
                                                    <button type="submit" class="btn-sm-del"
                                                            onclick="return confirm('이 첨부파일을 삭제하시겠습니까?')">삭제</button>
                                                </form>
                                            </div>
                                        </div>
                                        <div id="editPendingList_label" class="attach-section-label" style="display:none; margin-top:8px;">추가할 파일</div>
                                        <div id="editPendingList"></div>
                                        <div class="attach-add-area">
                                            <button type="button" class="btn-attach-add"
                                                    onclick="document.getElementById('editFileInput').click()">
                                                &#128206; 파일 추가
                                            </button>
                                            <span class="attach-hint">여러 파일 동시 선택 가능</span>
                                        </div>
                                        <input type="file" id="editFileInput" name="attachFiles" multiple style="display:none;">
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div id="deleteModal" class="modal-overlay">
    <div class="modal modal-sm">
        <div class="modal-header red">
            <span class="modal-title">&#128465; 삭제 확인</span>
            <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
        </div>
        <div class="modal-body">
            <p><strong th:text="${community.title}">자료</strong> 을(를) 삭제하시겠습니까?</p>
            <p style="margin-top:8px;color:#718096;font-size:12px;">삭제된 데이터는 복구할 수 없습니다.</p>
        </div>
        <div class="modal-footer">
            <form th:action="@{/archive/{id}/delete(id=${community.id})}" method="post">
                <button type="submit" class="btn btn-delete">삭제</button>
            </form>
            <button type="button" class="btn btn-cancel" onclick="closeDeleteModal()">취소</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script th:src="@{/js/common.js}"></script>
<script>
    var editQuill = new Quill('#editEditor', { theme: 'snow' });

    function switchToEdit() {
        document.getElementById('viewSection').style.display = 'none';
        document.getElementById('editSection').style.display = 'block';
        document.getElementById('viewButtons').style.display = 'none';
        document.getElementById('editButtons').style.display = 'flex';
        // 기존 내용을 에디터에 로드
        var existing = document.getElementById('editContentInput').value;
        if (existing) editQuill.root.innerHTML = existing;
    }
    function switchToView() {
        document.getElementById('viewSection').style.display = 'block';
        document.getElementById('editSection').style.display = 'none';
        document.getElementById('viewButtons').style.display = 'flex';
        document.getElementById('editButtons').style.display = 'none';
    }
    function openDeleteModal()  { document.getElementById('deleteModal').classList.add('open'); }
    function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('open'); }
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });

    // 폼 제출 시 Quill 내용 → hidden input 동기화
    document.getElementById('communityEditForm').addEventListener('submit', function() {
        document.getElementById('editContentInput').value = editQuill.root.innerHTML;
    });

    (function() {
        var editMode = /*[[${editMode != null && editMode}]]*/ false;
        if (editMode) switchToEdit();
    })();

    initAttachUpload('editFileInput', 'editPendingList', 'communityEditForm');
</script>
</body>
</html>
