<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사업 Home - E4NET PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* ── 배너 ── */
        .home-banner {
            width: 100%;
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 45%, #2980b9 100%);
            border-radius: 6px;
            padding: 36px 40px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }
        .home-banner .banner-left {}
        .home-banner .banner-title {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
        }
        .home-banner .banner-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.65);
            margin-top: 6px;
            letter-spacing: 0.5px;
        }
        .home-banner .banner-right {
            text-align: right;
        }
        .home-banner .banner-project {
            font-size: 15px;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
        }
        .home-banner .banner-date {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
            margin-top: 4px;
        }
        .banner-icon {
            font-size: 48px;
            margin-right: 20px;
            opacity: 0.85;
        }
        .banner-left-wrap { display:flex; align-items:center; }

        /* ── 대시보드 그리드 ── */
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .dash-card {
            background: white;
            border-radius: 5px;
            border: 1px solid #e0e0e0;
            overflow: hidden;
        }
        .dash-card-header {
            background: #2c3e50;
            color: white;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dash-card-header.blue  { background: #2980b9; }
        .dash-card-header.green { background: #27ae60; }
        .dash-card-header.red   { background: #c0392b; }
        .dash-card-header .more {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
        }
        .dash-card-header .more:hover { color: white; }
        .dash-card-body { padding: 0; }

        /* 공지사항·자료실 리스트 */
        .notice-list { list-style: none; margin: 0; padding: 0; }
        .notice-list li {
            padding: 9px 16px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        .notice-list li:last-child { border-bottom: none; }
        .notice-list a { color: #333; text-decoration: none; }
        .notice-list a:hover { color: #2980b9; text-decoration: underline; }
        .notice-list .date { color: #aaa; font-size: 11px; white-space: nowrap; margin-left: 8px; }
        .notice-list .title-wrap { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1; }
        .notice-empty { padding: 20px 16px; text-align: center; color: #aaa; font-size: 12px; }

        /* 이슈·위험 테이블 */
        .mini-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .mini-table th {
            background: #f8f8f8;
            padding: 7px 12px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            color: #666;
            font-weight: normal;
        }
        .mini-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }
        .mini-table tr:last-child td { border-bottom: none; }
        .mini-table tr:hover td { background: #fafafa; }
        .mini-table .td-left { text-align: left; }
        .mini-table .td-center { text-align: center; }
        .mini-table a { color: #2980b9; text-decoration: none; }
        .mini-table a:hover { text-decoration: underline; }
        .mini-empty td { text-align: center; color: #aaa; padding: 20px !important; }
    </style>
</head>
<body>

<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">
    <aside th:replace="~{layout/fragments :: sidebar('home')}"></aside>

    <div class="main">
        <div class="content">

            <!-- ── 배너 ── -->
            <div class="home-banner">
                <div class="banner-left-wrap">
                    <span class="banner-icon">&#128203;</span>
                    <div class="banner-left">
                        <div class="banner-title">E4NET PMS</div>
                        <div class="banner-sub">Project Management System &nbsp;|&nbsp; 프로젝트관리시스템</div>
                    </div>
                </div>
                <div class="banner-right">
                    <div class="banner-project"
                         th:text="${selectedProject != null ? selectedProject.projectName : ''}"></div>
                    <div class="banner-date" th:text="${#temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일')}"></div>
                </div>
            </div>

            <!-- ── Row 1: 공지사항 | 자료실 ── -->
            <div class="dash-grid" style="margin-bottom:16px;">

                <!-- 공지사항 -->
                <div class="dash-card">
                    <div class="dash-card-header blue">
                        &#128276; 공지사항
                        <a href="/notice" class="more">전체보기 &gt;</a>
                    </div>
                    <div class="dash-card-body">
                        <div class="notice-empty" th:if="${notices == null or notices.isEmpty()}">등록된 공지사항이 없습니다.</div>
                        <ul class="notice-list" th:unless="${notices == null or notices.isEmpty()}">
                            <li th:each="n : ${notices}">
                                <span class="title-wrap">
                                    <a th:href="@{/notice/{id}(id=${n.id})}" th:text="${n.title}"></a>
                                </span>
                                <span class="date" th:text="${n.postDate}"></span>
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- 자료실 -->
                <div class="dash-card">
                    <div class="dash-card-header">
                        &#128194; 자료실
                        <a href="/archive" class="more">전체보기 &gt;</a>
                    </div>
                    <div class="dash-card-body">
                        <div class="notice-empty" th:if="${archives == null or archives.isEmpty()}">등록된 자료가 없습니다.</div>
                        <ul class="notice-list" th:unless="${archives == null or archives.isEmpty()}">
                            <li th:each="a : ${archives}">
                                <span class="title-wrap">
                                    <a th:href="@{/archive/{id}(id=${a.id})}" th:text="${a.title}"></a>
                                </span>
                                <span class="date" th:text="${a.postDate}"></span>
                            </li>
                        </ul>
                    </div>
                </div>

            </div>

            <!-- ── Row 2: 이슈 현황 | 위험 현황 ── -->
            <div class="dash-grid">

                <!-- 이슈 현황 -->
                <div class="dash-card">
                    <div class="dash-card-header green">
                        &#9888; 이슈 현황
                        <a href="/issue" class="more">전체보기 &gt;</a>
                    </div>
                    <div class="dash-card-body">
                        <table class="mini-table">
                            <thead>
                                <tr>
                                    <th style="width:80px;">관리번호</th>
                                    <th style="width:200px;">이슈명</th>
                                    <th style="width:80px;">제기일</th>
                                    <th style="width:80px;">조치상태</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="mini-empty" th:if="${openIssues == null or openIssues.isEmpty()}">
                                    <td colspan="4">미처리 이슈가 없습니다.</td>
                                </tr>
                                <tr th:each="i : ${openIssues}">
                                    <td class="td-center" style="font-size:11px;color:#888;" th:text="${i.issueNo ?: '-'}"></td>
                                    <td class="td-left">
                                        <a th:href="@{/issue/{id}(id=${i.id})}"
                                           th:text="${#strings.abbreviate(i.issueName, 30)}"></a>
                                    </td>
                                    <td class="td-center" th:text="${i.raisedDate ?: '-'}"></td>
                                    <td class="td-center">
                                        <span class="badge"
                                              th:classappend="${i.actionStatus == '조치중'} ? 'badge-개발중' :
                                                              (${i.actionStatus == '미조치'} ? 'badge-미도래' : 'badge-default')"
                                              th:text="${i.actionStatus ?: '-'}"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 위험 현황 -->
                <div class="dash-card">
                    <div class="dash-card-header red">
                        &#128680; 위험 현황
                        <a href="/risk" class="more">전체보기 &gt;</a>
                    </div>
                    <div class="dash-card-body">
                        <table class="mini-table">
                            <thead>
                                <tr>
                                    <th style="width:80px;">위험코드</th>
                                    <th style="width:200px;">위험명</th>
                                    <th style="width:70px;">등급</th>
                                    <th style="width:80px;">상태</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="mini-empty" th:if="${openRisks == null or openRisks.isEmpty()}">
                                    <td colspan="4">진행 중인 위험이 없습니다.</td>
                                </tr>
                                <tr th:each="r : ${openRisks}">
                                    <td class="td-center" style="font-size:11px;color:#888;" th:text="${r.riskCode ?: '-'}"></td>
                                    <td class="td-left">
                                        <a th:href="@{/risk/{id}(id=${r.id})}"
                                           th:text="${#strings.abbreviate(r.riskName, 30)}"></a>
                                    </td>
                                    <td class="td-center">
                                        <span class="badge"
                                              th:classappend="${r.riskLevel == 'HIGH' or r.riskLevel == 'VERY HIGH'} ? 'badge-완료' :
                                                              (${r.riskLevel == 'MODERATE'} ? 'badge-개발중' : 'badge-default')"
                                              th:text="${r.riskLevel ?: '-'}"></span>
                                    </td>
                                    <td class="td-center">
                                        <span class="badge"
                                              th:classappend="${r.status == '진행중'} ? 'badge-개발중' :
                                                              (${r.status == '해결'} ? 'badge-완료' : 'badge-default')"
                                              th:text="${r.status ?: '-'}"></span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
</body>
</html>
