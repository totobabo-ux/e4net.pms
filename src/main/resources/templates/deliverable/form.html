<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'create'} ? '산출물 등록 - E4NET PMS' : '산출물 수정 - E4NET PMS'">산출물 폼 - E4NET PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 상단 헤더 -->
<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">

    <!-- 좌측 사이드바 -->
    <aside th:replace="~{layout/fragments :: sidebar('biz-standard-output')}"></aside>

    <!-- 메인 콘텐츠 -->
    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업관리</span>
            <span class="sep">/</span><span>표준관리</span>
            <span class="sep">/</span><a href="/deliverable">산출물관리</a>
            <span class="sep">/</span>
            <span class="current" th:text="${mode == 'create'} ? '산출물 등록' : '산출물 수정'">산출물 등록</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title" th:text="${mode == 'create'} ? '산출물 등록' : '산출물 수정'">산출물 등록</div>
                <div class="btn-group">
                    <button type="submit" form="deliverableForm" class="btn btn-primary">
                        &#10003; <span th:text="${mode == 'create'} ? '등록' : '저장'">등록</span>
                    </button>
                    <button type="button" class="btn btn-cancel" onclick="location.href='/deliverable'">&#10005; 취소</button>
                </div>
            </div>

            <form id="deliverableForm"
                  th:action="${mode == 'create'} ? @{/deliverable} : @{/deliverable/{id}/edit(id=${deliverable.id})}"
                  method="post"
                  th:object="${deliverable}">

                <div class="form-card">
                    <div class="form-card-header">&#128196; 산출물 정보</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <!-- Row 1: 사업명 / 산출물 구분※ -->
                            <div class="form-cell">
                                <label class="form-label">사업명</label>
                                <input type="hidden" th:field="*{projectId}">
                                <span th:text="${session.selectedProject != null ? session.selectedProject.projectName : ''}"
                                      style="font-weight:bold; color:#2c3e50; padding: 6px 12px;"></span>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">산출물 구분<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <select class="form-control" th:field="*{deliverableType}"
                                            th:classappend="${#fields.hasErrors('deliverableType')} ? 'is-invalid'">
                                        <option value="">-- 구분 선택 --</option>
                                        <option th:each="c : ${codes['DELIVERABLE_TYPE']}"
                                                th:value="${c.code}" th:text="${c.codeName}"></option>
                                    </select>
                                    <span class="field-error" th:if="${#fields.hasErrors('deliverableType')}"
                                          th:errors="*{deliverableType}"></span>
                                </div>
                            </div>

                            <!-- Row 2: 분류1※ / 분류2※ -->
                            <div class="form-cell">
                                <label class="form-label">분류1<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <input type="text" class="form-control" th:field="*{category1}"
                                           th:classappend="${#fields.hasErrors('category1')} ? 'is-invalid'"
                                           placeholder="분류1 입력">
                                    <span class="field-error" th:if="${#fields.hasErrors('category1')}"
                                          th:errors="*{category1}"></span>
                                </div>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">분류2<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <input type="text" class="form-control" th:field="*{category2}"
                                           th:classappend="${#fields.hasErrors('category2')} ? 'is-invalid'"
                                           placeholder="분류2 입력">
                                    <span class="field-error" th:if="${#fields.hasErrors('category2')}"
                                          th:errors="*{category2}"></span>
                                </div>
                            </div>

                            <!-- Row 3: 코드※ / 산출물ID※ -->
                            <div class="form-cell">
                                <label class="form-label">코드<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <input type="text" class="form-control" th:field="*{code}"
                                           th:classappend="${#fields.hasErrors('code')} ? 'is-invalid'"
                                           placeholder="코드 입력">
                                    <span class="field-error" th:if="${#fields.hasErrors('code')}"
                                          th:errors="*{code}"></span>
                                </div>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">산출물ID<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <input type="text" class="form-control" th:field="*{deliverableId}"
                                           th:classappend="${#fields.hasErrors('deliverableId')} ? 'is-invalid'"
                                           placeholder="예: OUT-001">
                                    <span class="field-error" th:if="${#fields.hasErrors('deliverableId')}"
                                          th:errors="*{deliverableId}"></span>
                                </div>
                            </div>

                            <!-- Row 4: 산출물명※ (전체 너비) -->
                            <div class="form-cell" style="grid-column: 1 / -1;">
                                <label class="form-label">산출물명<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <input type="text" class="form-control" th:field="*{name}"
                                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                           placeholder="산출물명을 입력하세요">
                                    <span class="field-error" th:if="${#fields.hasErrors('name')}"
                                          th:errors="*{name}"></span>
                                </div>
                            </div>

                            <!-- Row 5: 작성여부 / 단계 -->
                            <div class="form-cell" style="border-right: 1px solid #d0d8e4;">
                                <label class="form-label">작성여부</label>
                                <select class="form-control" th:field="*{writtenYn}">
                                    <option value="">-- 선택 --</option>
                                    <option th:each="c : ${codes['DELIVERABLE_WRITE_YN']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell" style="border-right: none;">
                                <label class="form-label">단계</label>
                                <select class="form-control" th:field="*{stage}">
                                    <option value="">-- 단계 선택 --</option>
                                    <option th:each="c : ${codes['DELIVERABLE_STAGE']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>

                            <!-- Row 6: 작성자 / 빈칸 -->
                            <div class="form-cell" style="border-right: 1px solid #d0d8e4;">
                                <label class="form-label">작성자</label>
                                <input type="text" class="form-control" th:field="*{writer}" placeholder="작성자명">
                            </div>
                            <div class="form-cell" style="border-right: none;"></div>

                            <!-- Row 7: 비고 (전체 너비) -->
                            <div class="form-cell" style="grid-column: 1 / -1; align-items: flex-start;">
                                <label class="form-label">비고</label>
                                <textarea class="form-control" th:field="*{note}"
                                          rows="3" placeholder="비고 사항을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                        </div>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
</body>
</html>
