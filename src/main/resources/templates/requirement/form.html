<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'create'} ? '요구사항 등록 - E4NET PMS' : '요구사항 수정 - E4NET PMS'">요구사항 폼 - E4NET PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body>

<!-- 상단 헤더 -->
<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">

    <!-- 좌측 사이드바 -->
    <aside th:replace="~{layout/fragments :: sidebar('biz-scope-requirement')}"></aside>

    <!-- 메인 콘텐츠 -->
    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업 수행</span>
            <span class="sep">/</span><a href="/requirement">요구사항관리</a>
            <span class="sep">/</span>
            <span class="current" th:text="${mode == 'create'} ? '요구사항 등록' : '요구사항 수정'">요구사항 등록</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title" th:text="${mode == 'create'} ? '요구사항 등록' : '요구사항 수정'">요구사항 등록</div>
                <div class="btn-group">
                    <button type="submit" form="requirementForm" class="btn btn-primary">
                        &#10003; <span th:text="${mode == 'create'} ? '등록' : '저장'">등록</span>
                    </button>
                    <button type="button" class="btn btn-cancel" onclick="location.href='/requirement'">&#10005; 취소</button>
                </div>
            </div>

            <form id="requirementForm"
                  th:action="${mode == 'create'} ? @{/requirement} : @{/requirement/{id}/edit(id=${requirement.id})}"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${requirement}">

                <div class="form-card">
                    <div class="form-card-header">&#128196; 요구사항 정보</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <!-- Row 1: 사업명 / 요구사항ID -->
                            <div class="form-cell">
                                <label class="form-label">사업명</label>
                                <input type="hidden" th:field="*{projectId}">
                                <span th:text="${session.selectedProject != null ? session.selectedProject.projectName : ''}"
                                      style="font-weight:bold; color:#2c3e50;"></span>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">요구사항ID</label>
                                <input type="text" class="form-control" th:field="*{reqCode}" placeholder="예: REQ-001">
                            </div>

                            <!-- Row 2: 제목 (전체 너비) -->
                            <div class="form-cell" style="grid-column: 1 / -1;">
                                <label class="form-label">제목<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <input type="text" class="form-control" th:field="*{title}"
                                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                           placeholder="요구사항 제목을 입력하세요">
                                    <span class="field-error" th:if="${#fields.hasErrors('title')}"
                                          th:errors="*{title}"></span>
                                </div>
                            </div>

                            <!-- Row 2-1: 요구사항 출처 (전체 너비) -->
                            <div class="form-cell" style="grid-column: 1 / -1;">
                                <label class="form-label">요구사항 출처</label>
                                <div style="display:flex; gap:8px; flex:1;">
                                    <select class="form-control" th:field="*{sourceType}" style="flex:0 0 140px;">
                                        <option value="">-- 출처 선택 --</option>
                                        <option th:each="c : ${codes['REQ_SOURCE']}"
                                                th:value="${c.code}" th:text="${c.codeName}"></option>
                                    </select>
                                    <input type="text" class="form-control" th:field="*{sourceContent}" placeholder="출처 내용을 입력하세요">
                                </div>
                            </div>

                            <!-- Row 3: 분류 / 우선순위 -->
                            <div class="form-cell">
                                <label class="form-label">분류</label>
                                <select class="form-control" th:field="*{category}">
                                    <option value="">-- 분류 선택 --</option>
                                    <option th:each="c : ${codes['REQ_TYPE']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">우선순위</label>
                                <select class="form-control" th:field="*{priority}">
                                    <option th:each="c : ${codes['REQ_PRIORITY']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>

                            <!-- Row 4: 상태 / 요청자 -->
                            <div class="form-cell">
                                <label class="form-label">상태</label>
                                <select class="form-control" th:field="*{status}">
                                    <option th:each="c : ${codes['REQ_STATUS']}"
                                            th:value="${c.code}" th:text="${c.codeName}"></option>
                                </select>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">요청자</label>
                                <input type="text" class="form-control" th:field="*{requestor}" placeholder="요청자명">
                            </div>

                            <!-- Row 4-1: 수용여부 -->
                            <div class="form-cell">
                                <label class="form-label">수용여부</label>
                                <select class="form-control" th:field="*{acceptance}">
                                    <option value="협의중">협의중</option>
                                    <option value="수용">수용</option>
                                    <option value="제외">제외</option>
                                </select>
                            </div>
                            <div class="form-cell"></div>

                            <!-- Row 5: 내용 (전체 너비) -->
                            <div class="form-cell" style="grid-column: 1 / -1; align-items: flex-start;">
                                <label class="form-label" >내용</label>
                                <textarea class="form-control" th:field="*{description}"
                                          rows="6" placeholder="요구사항 상세 내용을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                            <!-- Row 6: 비고 (전체 너비) -->
                            <div class="form-cell" style="grid-column: 1 / -1; align-items: flex-start;">
                                <label class="form-label" >비고</label>
                                <textarea class="form-control" th:field="*{note}"
                                          rows="3" placeholder="비고 사항을 입력하세요"
                                          style="resize:vertical;"></textarea>
                            </div>

                            <!-- 첨부파일 -->
                            <div class="form-cell" style="grid-column: 1 / -1; align-items:flex-start;">
                                <label class="form-label">첨부파일</label>
                                <div class="attach-zone">
                                    <div id="pendingList_label" class="attach-section-label" style="display:none; margin-top:8px;">추가할 파일</div>
                                    <div id="pendingList"></div>
                                    <div class="attach-add-area">
                                        <button type="button" class="btn-attach-add"
                                                onclick="document.getElementById('attachFileInput').click()">
                                            &#128206; 파일 추가
                                        </button>
                                        <span class="attach-hint">여러 파일 동시 선택 가능</span>
                                    </div>
                                    <input type="file" id="attachFileInput" name="attachFiles" multiple style="display:none;">
                                </div>
                            </div>

                        </div>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    initAttachUpload('attachFileInput', 'pendingList', 'requirementForm');
</script>
</body>
</html>
