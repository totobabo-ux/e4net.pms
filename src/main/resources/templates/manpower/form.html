<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'create'} ? '인력 등록 - e4net PMS' : '인력 수정 - e4net PMS'">인력 폼 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* ── manpower/form.html 전용 스타일 ── */
        .modal-table thead th { border-right: none; }
        .modal-table tbody td { border-right: none; }
    </style>
</head>
<body>

<!-- 상단 헤더 -->
<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">

    <!-- 좌측 사이드바 -->
    <aside th:replace="~{layout/fragments :: sidebar('plan-manpower')}"></aside>

    <!-- 메인 콘텐츠 -->
    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span><span>사업 계획</span>
            <span class="sep">/</span><a href="/manpower">인력계획</a>
            <span class="sep">/</span>
            <span class="current" th:text="${mode == 'create'} ? '인력 등록' : '인력 수정'">인력 등록</span>
        </div>

        <div class="content">
            <div class="page-header">
                <div class="page-title" th:text="${mode == 'create'} ? '사업 인력 등록' : '사업 인력 수정'">사업 인력 등록</div>
                <div class="btn-group">
                    <button type="submit" form="manpowerForm" class="btn btn-primary">
                        &#10003; <span th:text="${mode == 'create'} ? '등록' : '저장'">등록</span>
                    </button>
                    <button type="button" class="btn btn-cancel" onclick="location.href='/manpower'">&#10005; 취소</button>
                </div>
            </div>

            <form id="manpowerForm"
                  th:action="${mode == 'create'} ? @{/manpower} : @{/manpower/{id}/edit(id=${manpower.id})}"
                  method="post"
                  th:object="${manpower}"
                  onsubmit="return validateForm()">

                <div class="form-card">
                    <div class="form-card-header">&#128100; 사업 구성원 등록</div>
                    <div class="form-card-body">
                        <div class="form-grid-2col">

                            <!-- Row 1: 사업명 / 참여자 -->
                            <div class="form-cell">
                                <label class="form-label">사업명<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <select class="form-control" th:field="*{projectId}"
                                            th:classappend="${#fields.hasErrors('projectId')} ? 'is-invalid'">
                                        <option value="">-- 사업 선택 --</option>
                                        <option th:each="p : ${projects}"
                                                th:value="${p.id}"
                                                th:text="${p.projectName}"></option>
                                    </select>
                                    <span class="field-error" th:if="${#fields.hasErrors('projectId')}"
                                          th:errors="*{projectId}"></span>
                                </div>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">참여자<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <div class="input-with-btn">
                                        <input type="text" id="userNameDisplay" class="form-control"
                                               th:value="*{userName}" placeholder="조회 버튼으로 선택"
                                               readonly style="background:#f7f8fa; cursor:default;">
                                        <input type="hidden" th:field="*{userId}" id="userId">
                                        <button type="button" class="btn-lookup" onclick="openUserModal()">&#128269; 조회</button>
                                    </div>
                                    <span class="field-error" th:if="${#fields.hasErrors('userId')}"
                                          th:errors="*{userId}"></span>
                                </div>
                            </div>

                            <!-- Row 2: 소속회사 / 소속부서 -->
                            <div class="form-cell">
                                <label class="form-label">소속회사</label>
                                <input type="text" class="form-control" th:field="*{company}"
                                       id="fieldCompany" placeholder="소속회사">
                            </div>
                            <div class="form-cell">
                                <label class="form-label">소속부서</label>
                                <input type="text" class="form-control" th:field="*{department}"
                                       id="fieldDepartment" placeholder="소속부서">
                            </div>

                            <!-- Row 3: 연락처 / 직위 -->
                            <div class="form-cell">
                                <label class="form-label">연락처</label>
                                <input type="text" class="form-control" th:field="*{phone}"
                                       id="fieldPhone" placeholder="자동 채워짐">
                            </div>
                            <div class="form-cell">
                                <label class="form-label">직위</label>
                                <input type="text" class="form-control" th:field="*{position}"
                                       id="fieldPosition" placeholder="직위">
                            </div>

                            <!-- Row 4: 역할 / 급수 -->
                            <div class="form-cell">
                                <label class="form-label">역할<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <input type="text" class="form-control" th:field="*{role}"
                                           th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'"
                                           placeholder="예: 프로젝트 매니저, 개발자">
                                    <span class="field-error" th:if="${#fields.hasErrors('role')}"
                                          th:errors="*{role}"></span>
                                </div>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">급수<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <select class="form-control" th:field="*{gradeCode}"
                                            th:classappend="${#fields.hasErrors('gradeCode')} ? 'is-invalid'">
                                        <option value="">-- 급수 선택 --</option>
                                        <option th:each="c : ${gradeCodes}"
                                                th:value="${c.code}"
                                                th:text="${c.codeName}"></option>
                                    </select>
                                    <span class="field-error" th:if="${#fields.hasErrors('gradeCode')}"
                                          th:errors="*{gradeCode}"></span>
                                </div>
                            </div>

                            <!-- Row 5: 투입구분 / 투입MM -->
                            <div class="form-cell">
                                <label class="form-label">투입구분<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <select class="form-control" th:field="*{inputTypeCode}"
                                            th:classappend="${#fields.hasErrors('inputTypeCode')} ? 'is-invalid'">
                                        <option value="">-- 투입구분 선택 --</option>
                                        <option th:each="c : ${inputTypeCodes}"
                                                th:value="${c.code}"
                                                th:text="${c.codeName}"></option>
                                    </select>
                                    <span class="field-error" th:if="${#fields.hasErrors('inputTypeCode')}"
                                          th:errors="*{inputTypeCode}"></span>
                                </div>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">투입MM</label>
                                <input type="number" class="form-control" th:field="*{inputMm}"
                                       step="0.1" min="0" placeholder="예: 3.5">
                            </div>

                            <!-- Row 6: 투입시작일 / 투입종료일 -->
                            <div class="form-cell">
                                <label class="form-label">투입시작일<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <input type="date" class="form-control" th:field="*{inputStartDate}"
                                           th:classappend="${#fields.hasErrors('inputStartDate')} ? 'is-invalid'">
                                    <span class="field-error" th:if="${#fields.hasErrors('inputStartDate')}"
                                          th:errors="*{inputStartDate}"></span>
                                </div>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">투입종료일<span class="req">※</span></label>
                                <div style="flex:1;">
                                    <input type="date" class="form-control" th:field="*{inputEndDate}"
                                           th:classappend="${#fields.hasErrors('inputEndDate')} ? 'is-invalid'">
                                    <span class="field-error" th:if="${#fields.hasErrors('inputEndDate')}"
                                          th:errors="*{inputEndDate}"></span>
                                </div>
                            </div>

                            <!-- Row 7: 상태 / 비고 -->
                            <div class="form-cell">
                                <label class="form-label">상태</label>
                                <select class="form-control" th:field="*{status}">
                                    <option value="투입중">투입중</option>
                                    <option value="대기">대기</option>
                                    <option value="투입종료">투입종료</option>
                                </select>
                            </div>
                            <div class="form-cell">
                                <label class="form-label">비고</label>
                                <input type="text" class="form-control" th:field="*{note}" placeholder="비고 사항">
                            </div>

                        </div>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- 참여자 조회 모달 -->
<div id="userModal" class="modal-overlay">
    <div class="modal modal-lg">
        <div class="modal-header">
            <span class="modal-title">&#128269; 참여자 조회</span>
            <button class="modal-close" onclick="closeUserModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-search-row">
                <input type="text" id="modalSearchName" class="modal-search-input" placeholder="이름 입력" onkeydown="if(event.key==='Enter') searchUsers()">
                <input type="text" id="modalSearchCompany" class="modal-search-input" placeholder="소속회사 입력" onkeydown="if(event.key==='Enter') searchUsers()">
                <button class="btn-modal-search" onclick="searchUsers()">&#128269; 검색</button>
            </div>
            <div id="modalResult">
                <p class="modal-empty">검색어를 입력하고 조회하세요.</p>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
    function openUserModal() {
        document.getElementById('userModal').classList.add('open');
        document.getElementById('modalSearchName').focus();
    }
    function closeUserModal() {
        document.getElementById('userModal').classList.remove('open');
    }
    document.getElementById('userModal').addEventListener('click', function(e) {
        if (e.target === this) closeUserModal();
    });

    function searchUsers() {
        var name    = document.getElementById('modalSearchName').value.trim();
        var company = document.getElementById('modalSearchCompany').value.trim();
        var resultDiv = document.getElementById('modalResult');
        if (!name && !company) {
            resultDiv.innerHTML = '<p class="modal-empty">검색어를 입력해주세요.</p>';
            return;
        }
        fetch('/api/users/search?name=' + encodeURIComponent(name) + '&company=' + encodeURIComponent(company))
            .then(function(r) { return r.json(); })
            .then(function(users) {
                if (users.length === 0) {
                    resultDiv.innerHTML = '<p class="modal-empty">검색 결과가 없습니다.</p>';
                    return;
                }
                var html = '<table class="modal-table"><thead><tr><th>사번</th><th>이름</th><th>소속회사</th><th>소속부서</th><th>직위</th><th>연락처</th></tr></thead><tbody>';
                users.forEach(function(u) {
                    html += '<tr onclick="selectUser(' + u.id + ',\'' + esc(u.name) + '\',\'' + esc(u.company||'') + '\',\'' + esc(u.department||'') + '\',\'' + esc(u.position||'') + '\',\'' + esc(u.phone||'') + '\')">'
                        + '<td>' + (u.employeeNo||'-') + '</td><td><strong>' + u.name + '</strong></td>'
                        + '<td>' + (u.company||'-') + '</td><td>' + (u.department||'-') + '</td>'
                        + '<td>' + (u.position||'-') + '</td><td>' + (u.phone||'-') + '</td></tr>';
                });
                html += '</tbody></table>';
                resultDiv.innerHTML = html;
            })
            .catch(function() { resultDiv.innerHTML = '<p class="modal-empty" style="color:#e53e3e;">오류가 발생했습니다.</p>'; });
    }

    function esc(s) { return String(s).replace(/'/g, "\\'"); }

    function selectUser(id, name, company, department, position, phone) {
        document.getElementById('userId').value          = id;
        document.getElementById('userNameDisplay').value = name;
        document.getElementById('fieldCompany').value    = company;
        document.getElementById('fieldDepartment').value = department;
        document.getElementById('fieldPosition').value   = position;
        document.getElementById('fieldPhone').value      = phone;
        closeUserModal();
    }

    function validateForm() {
        function check(name, msg) {
            var el = document.querySelector('[name="' + name + '"]') || document.getElementById(name);
            if (!el || !el.value.trim()) { alert(msg); if(el) el.focus(); return false; }
            return true;
        }
        return check('projectId','사업을 선택해주세요.')
            && check('userId','참여자를 선택해주세요.')
            && check('role','역할을 입력해주세요.')
            && check('gradeCode','급수를 선택해주세요.')
            && check('inputTypeCode','투입구분을 선택해주세요.')
            && check('inputStartDate','투입시작일을 입력해주세요.')
            && check('inputEndDate','투입종료일을 입력해주세요.')
            && (function(){
                var s = document.querySelector('[name="inputStartDate"]').value;
                var e = document.querySelector('[name="inputEndDate"]').value;
                if(s && e && e < s){ alert('투입종료일은 시작일 이후여야 합니다.'); return false; }
                return true;
            })();
    }
</script>
</body>
</html>
