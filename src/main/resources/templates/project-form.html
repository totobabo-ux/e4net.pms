<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${mode == 'create'} ? '사업 등록 - e4net PMS' : '사업 수정 - e4net PMS'">사업 폼 - e4net PMS</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        /* ── project-form.html 전용 스타일 ── */
        .form-card { padding: 28px 32px; }
        .form-actions .btn { height: 36px; padding: 0 28px; font-size: 14px; }
    </style>
</head>
<body>

<!-- 상단 헤더 -->
<header th:replace="~{layout/fragments :: header}"></header>

<div class="body-wrap">

    <!-- 좌측 사이드바 -->
    <aside th:replace="~{layout/fragments :: sidebar('plan-info')}"></aside>

    <!-- 메인 콘텐츠 -->
    <div class="main">
        <div class="breadcrumb">
            &#127968; <a href="/home">Home</a>
            <span class="sep">/</span>
            <span>사업 계획</span>
            <span class="sep">/</span>
            <a href="/projects">사업정보 관리</a>
            <span class="sep">/</span>
            <span class="current" th:text="${mode == 'create'} ? '사업 등록' : '사업 수정'"></span>
        </div>

        <div class="content">
            <div class="page-title" th:text="${mode == 'create'} ? '사업 등록' : '사업 수정'"></div>

            <form th:action="${mode == 'create'} ? @{/projects} : @{/projects/{id}/edit(id=${project.id})}"
                  method="post" th:object="${project}">

                <div class="form-card">

                    <!-- 기본 정보 -->
                    <div class="form-section-title">기본 정보</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">프로젝트 코드</label>
                            <input type="text" th:field="*{projectCode}" class="form-control" placeholder="예) 2026-001">
                        </div>
                        <div class="form-group full" style="grid-column: 2 / 4;">
                            <label class="form-label">프로젝트명 <span class="required">※</span></label>
                            <input type="text" th:field="*{projectName}"
                                   th:classappend="${#fields.hasErrors('projectName')} ? 'error' : ''"
                                   class="form-control" placeholder="프로젝트명을 입력하세요">
                            <span class="form-error" th:if="${#fields.hasErrors('projectName')}"
                                  th:errors="*{projectName}"></span>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">구분</label>
                            <select th:field="*{category}" class="form-control">
                                <option value="">선택</option>
                                <option value="SL">SL</option>
                                <option value="SM">SM</option>
                                <option value="서비스">서비스</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">하위 구분</label>
                            <select th:field="*{subCategory}" class="form-control">
                                <option value="">선택</option>
                                <option value="ITS">ITS</option>
                                <option value="기타">기타</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">회사</label>
                            <select th:field="*{company}" class="form-control">
                                <option value="">(주)이포넷</option>
                                <option value="(주)이포넷">(주)이포넷</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-grid col-2">
                        <div class="form-group">
                            <label class="form-label">공개여부</label>
                            <div class="radio-group">
                                <label><input type="radio" th:field="*{isPublic}" th:value="${true}"> 공개</label>
                                <label><input type="radio" th:field="*{isPublic}" th:value="${false}"> 비공개</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">진행상태</label>
                            <select th:field="*{status}" class="form-control">
                                <option value="">선택</option>
                                <option value="영업">영업</option>
                                <option value="진행">진행</option>
                                <option value="완료">완료</option>
                                <option value="종료">종료</option>
                                <option value="수주못함">수주못함</option>
                            </select>
                        </div>
                    </div>

                    <!-- 거래처 정보 -->
                    <div class="form-section-title">거래처 정보</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">발주처</label>
                            <input type="text" th:field="*{orderer}" class="form-control" placeholder="발주처명">
                        </div>
                        <div class="form-group">
                            <label class="form-label">계약처</label>
                            <input type="text" th:field="*{contractor}" class="form-control" placeholder="계약처명">
                        </div>
                        <div class="form-group">
                            <label class="form-label">PM</label>
                            <input type="text" th:field="*{pm}" class="form-control" placeholder="PM 이름">
                        </div>
                    </div>

                    <!-- 계약 정보 -->
                    <div class="form-section-title">계약 정보</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">계약 시작일</label>
                            <input type="date" th:field="*{contractStart}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">계약 종료일</label>
                            <input type="date" th:field="*{contractEnd}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">계약금액 (원)</label>
                            <input type="number" th:field="*{contractAmount}" class="form-control" placeholder="0">
                        </div>
                    </div>

                    <!-- 투입 정보 -->
                    <div class="form-section-title">투입 정보</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">사전투입 MM</label>
                            <input type="number" th:field="*{preInputMm}" step="0.1" class="form-control" placeholder="0.0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">총 MM</label>
                            <input type="number" th:field="*{totalMm}" step="0.1" class="form-control" placeholder="0.0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">인원수</label>
                            <input type="number" th:field="*{headcount}" class="form-control" placeholder="0">
                        </div>
                    </div>

                </div><!-- /form-card -->

                <!-- 하단 버튼 -->
                <div class="form-actions">
                    <a href="/projects" class="btn btn-secondary">취소</a>
                    <button type="submit" class="btn btn-primary"
                            th:text="${mode == 'create'} ? '등록' : '수정'">저장</button>
                    <form th:if="${mode == 'edit'}"
                          th:action="@{/projects/{id}/delete(id=${project.id})}" method="post"
                          onsubmit="return confirm('정말 삭제하시겠습니까?')" style="margin:0;">
                        <button type="submit" class="btn btn-danger">삭제</button>
                    </form>
                </div>

            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/common.js}"></script>
</body>
</html>
